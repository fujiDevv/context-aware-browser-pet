version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "security"
    # Group all dependency updates into a single PR if possible
    groups:
      all-deps:
        patterns:
          - "*"
