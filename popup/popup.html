<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Pet Controls</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup-container">
    <!-- Header with Mascot Preview -->
    <header class="header">
      <div class="avatar-container">
        <div class="avatar-glow"></div>
        <img id="pet-preview" src="https://cdn.jsdelivr.net/gh/abderrahimghazali/clawd-pet@main/public/pets/clawd-happy.svg" alt="Pet Preview">
      </div>
      <div class="header-info">
        <h1 id="pet-name">Clawd</h1>
        <div class="level-badge">
          <span class="level-label">LVL</span>
          <span id="pet-level" class="level-num">1</span>
        </div>
      </div>
    </header>

    <!-- XP Progress Bar -->
    <div class="xp-section">
      <div class="xp-header">
        <span>Experience</span>
        <span id="xp-text">0 / 100 XP</span>
      </div>
      <div class="progress-track xp-track">
        <div id="bar-xp" class="progress-fill xp-fill" style="width: 0%"></div>
      </div>
    </div>

    <!-- Core Pet Stats -->
    <section class="stats-section">
      <h2>Mascot Stats</h2>
      
      <div class="stat-card">
        <div class="stat-info">
          <span class="stat-icon">🫶</span>
          <span class="stat-name">Happiness</span>
          <span id="txt-happiness" class="stat-val">50%</span>
        </div>
        <div class="progress-track">
          <div id="bar-happiness" class="progress-fill fill-pink" style="width: 50%"></div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-info">
          <span class="stat-icon">🍖</span>
          <span class="stat-name">Energy</span>
          <span id="txt-energy" class="stat-val">80%</span>
        </div>
        <div class="progress-track">
          <div id="bar-energy" class="progress-fill fill-yellow" style="width: 80%"></div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-info">
          <span class="stat-icon">🧐</span>
          <span class="stat-name">Curiosity</span>
          <span id="txt-curiosity" class="stat-val">60%</span>
        </div>
        <div class="progress-track">
          <div id="bar-curiosity" class="progress-fill fill-blue" style="width: 60%"></div>
        </div>
      </div>
    </section>

    <!-- Interactivity Actions -->
    <section class="actions-section">
      <button id="btn-pet" class="action-btn pet-btn">
        <span class="btn-emoji">🫶</span> Pet
      </button>
      <button id="btn-feed" class="action-btn feed-btn">
        <span class="btn-emoji">🍖</span> Feed
      </button>
      <button id="btn-shoo" class="action-btn shoo-btn">
        <span class="btn-emoji">👋</span> Shoo
      </button>
    </section>

    <!-- Settings & Customisation -->
    <section class="settings-section">
      <h2>Settings</h2>
      
      <div class="setting-row">
        <div class="setting-desc">
          <span class="setting-title">Pet Size</span>
          <span id="size-val" class="setting-val-badge">64px</span>
        </div>
        <input type="range" id="size-slider" min="48" max="128" value="64" class="custom-slider">
      </div>

      <div class="setting-row">
        <div class="setting-desc">
          <span class="setting-title">Movement Speed</span>
          <span id="speed-val" class="setting-val-badge">1.2x</span>
        </div>
        <input type="range" id="speed-slider" min="1" max="50" value="12" class="custom-slider">
      </div>

      <!-- Sound Settings -->
      <div class="setting-row toggle-row">
        <div class="setting-desc">
          <span class="setting-title">Sound Effects</span>
          <span class="setting-subtitle">Toggle retro chiptunes</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="sound-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div id="volume-container" class="setting-row">
        <div class="setting-desc">
          <span class="setting-title">Volume</span>
          <span id="volume-val" class="setting-val-badge">50%</span>
        </div>
        <input type="range" id="volume-slider" min="0" max="100" value="50" class="custom-slider">
      </div>

      <!-- AI Mood Toggle -->
      <div class="setting-row toggle-row">
        <div class="setting-desc">
          <span class="setting-title">AI Mood Analysis</span>
          <span class="setting-subtitle">Read pages to pick matching moods</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="ai-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- Secure API Key Section (visible when AI toggle is checked) -->
      <div id="api-key-container" class="setting-row api-key-row hidden">
        <span class="setting-title">Anthropic API Key</span>
        <div class="api-key-input-wrapper">
          <input type="password" id="api-key-input" placeholder="sk-ant-...">
          <button id="btn-toggle-key" class="icon-btn" type="button">👁️</button>
        </div>
      </div>
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
