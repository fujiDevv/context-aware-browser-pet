<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .cool-body { transform-origin: 7.5px 15px; animation: cool-lean 3s infinite ease-in-out; }
      .cool-shadow { animation: cool-s 3s infinite; }
      .cool-shine { animation: cool-glint 2s infinite ease-in-out; }
      @keyframes cool-lean { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(3deg); } }
      @keyframes cool-s { 0%, 100% { opacity: 0.5; } }
      @keyframes cool-glint { 0%, 100% { opacity: 0; } 50% { opacity: 0.8; } }
    </style>
  </defs>
  <rect class="cool-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <g class="cool-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Sunglasses -->
    <rect x="3" y="7" width="4" height="2" fill="#111"/>
    <rect x="9" y="7" width="4" height="2" fill="#111"/>
    <rect x="7" y="7" width="2" height="1" fill="#111"/>
    <rect x="1" y="7" width="2" height="1" fill="#111"/>
    <rect x="13" y="7" width="1" height="1" fill="#111"/>
    <rect class="cool-shine" x="4" y="7" width="1" height="1" fill="#FFF"/>
  </g>
</svg>
