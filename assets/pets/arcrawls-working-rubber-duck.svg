<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .duck-body { transform-origin: 7.5px 15px; animation: duck-lean 3s infinite ease-in-out; }
      .duck-arm { transform-origin: 13px 10px; animation: duck-gesture 1.4s infinite ease-in-out; }
      .duck-toy { transform-origin: 18px 14px; animation: duck-bob 2s infinite ease-in-out; }
      .duck-d1 { animation: duck-talk 1.5s infinite; }
      .duck-d2 { animation: duck-talk 1.5s infinite 0.2s; }
      .duck-d3 { animation: duck-talk 1.5s infinite 0.4s; }
      @keyframes duck-lean { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(2deg); } }
      @keyframes duck-gesture { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(20deg); } }
      @keyframes duck-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-0.5px); } }
      @keyframes duck-talk { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <rect x="16" y="14" width="6" height="1" fill="#000" opacity="0.3"/>

  <!-- explaining the bug -->
  <g fill="#9E9E9E">
    <rect class="duck-d1" x="14" y="6" width="1" height="1"/>
    <rect class="duck-d2" x="15.5" y="6" width="1" height="1"/>
    <rect class="duck-d3" x="17" y="6" width="1" height="1"/>
  </g>

  <!-- rubber duck -->
  <g class="duck-toy">
    <rect x="16" y="12" width="4" height="2" fill="#FFCA28"/>
    <rect x="15" y="12" width="1" height="1" fill="#FFCA28"/>
    <rect x="16" y="12" width="2" height="1" fill="#FFB300"/>
    <rect x="19" y="10" width="2" height="2" fill="#FFCA28"/>
    <rect x="21" y="11" width="1" height="1" fill="#FB8C00"/>
    <rect x="20" y="10" width="1" height="1" fill="#000"/>
  </g>

  <g class="duck-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/>
    </g>
    <!-- glancing toward the duck -->
    <g fill="#000"><rect x="5" y="8" width="1" height="2"/><rect x="11" y="8" width="1" height="2"/></g>
    <g class="duck-arm"><rect x="13" y="9" width="2" height="2" fill="#DE886D"/></g>
  </g>
</svg>
