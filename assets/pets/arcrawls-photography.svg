<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs><style>
    .photo-body { transform-origin: 7.5px 15px; animation: photo-lean 3s ease-in-out infinite; }
    .photo-shadow { animation: photo-s 3s ease-in-out infinite; }
    .photo-flash { animation: photo-flash 3s ease-in-out infinite; }
    @keyframes photo-lean { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(2deg); } }
    @keyframes photo-s { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.45; } }
    @keyframes photo-flash { 0%, 85% { opacity: 0; } 90% { opacity: 1; } 95% { opacity: 0; } 100% { opacity: 0; } }
  </style></defs>
  <rect class="photo-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Flash -->
  <rect class="photo-flash" x="-5" y="6" width="5" height="5" fill="#FFF" opacity="0"/>
  <g class="photo-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Camera held in front -->
    <rect x="-2" y="9" width="4" height="3" fill="#444"/>
    <rect x="-1" y="8" width="2" height="1" fill="#555"/>
    <!-- Lens -->
    <rect x="-1" y="10" width="1" height="1" fill="#222"/>
    <g fill="#000">
      <rect x="5" y="9" width="1" height="2"/><rect x="10" y="9" width="1" height="2"/>
    </g>
  </g>
</svg>