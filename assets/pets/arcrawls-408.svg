<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .e408-body { transform-origin: 7.5px 15px; animation: e408-wait 3s infinite ease-in-out; }
      .e408-shadow { animation: e408-s 3s infinite; }
      .e408-text { animation: e408-flash 1.5s infinite; }
      .e408-clock { animation: e408-tick 1s infinite steps(4); }
      @keyframes e408-wait { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(0.5px); } }
      @keyframes e408-s { 0%, 100% { opacity: 0.5; } }
      @keyframes e408-flash { 0%, 60% { opacity: 1; } 30% { opacity: 0.4; } }
      @keyframes e408-tick { 0% { transform: rotate(0deg); } 25% { transform: rotate(90deg); } 50% { transform: rotate(180deg); } 75% { transform: rotate(270deg); } 100% { transform: rotate(360deg); } }
    </style>
  </defs>
  <rect class="e408-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- 408 text -->
  <g class="e408-text" fill="#FF8800">
    <!-- 4 -->
    <rect x="2" y="-3" width="1" height="3"/><rect x="2" y="0" width="3" height="1"/><rect x="4" y="-3" width="1" height="5"/>
    <!-- 0 -->
    <rect x="6" y="-3" width="3" height="1"/><rect x="6" y="1" width="3" height="1"/><rect x="6" y="-3" width="1" height="5"/><rect x="8" y="-3" width="1" height="5"/>
    <!-- 8 -->
    <rect x="10" y="-3" width="3" height="1"/><rect x="10" y="-1" width="3" height="1"/><rect x="10" y="1" width="3" height="1"/><rect x="10" y="-3" width="1" height="5"/><rect x="12" y="-3" width="1" height="5"/>
  </g>
  <!-- Clock -->
  <g>
    <rect x="16" y="5" width="4" height="4" fill="#444"/>
    <rect x="17" y="6" width="2" height="2" fill="#222"/>
    <g class="e408-clock" fill="#FFF" style="transform-origin: 18px 7px;">
      <rect x="17.8" y="6" width="0.4" height="1.2"/>
    </g>
  </g>
  <g class="e408-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Droopy tired eyes -->
    <g fill="#000">
      <rect x="4" y="9" width="2" height="1"/><rect x="10" y="9" width="2" height="1"/>
    </g>
  </g>
</svg>
