<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .error-body {
        transform-origin: 7.5px 15px;
        animation: error-shake 0.1s infinite alternate;
      }
      .error-shadow {
        animation: error-shadow-flash 1s infinite;
      }
      .error-flash {
        animation: error-bg-flash 1s infinite;
      }
      .error-x1 { animation: x-pulse 0.5s infinite alternate; }
      .error-x2 { animation: x-pulse 0.5s infinite alternate-reverse; }
      @keyframes error-shake {
        0% { transform: translateX(-1px); }
        100% { transform: translateX(1px); }
      }
      @keyframes error-shadow-flash {
        0%, 49% { fill: #FF0000; opacity: 0.3; }
        50%, 100% { fill: #000; opacity: 0.5; }
      }
      @keyframes error-bg-flash {
        0%, 49% { opacity: 0.1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes x-pulse {
        0% { opacity: 0.7; }
        100% { opacity: 1; }
      }
    </style>
  </defs>
  <rect class="error-flash" x="-15" y="-25" width="45" height="45" fill="#FF0000" opacity="0"/>
  <rect class="error-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Error X symbols floating -->
  <g fill="#FF0000">
    <g class="error-x1">
      <rect x="-1" y="-2" width="1" height="1"/><rect x="0" y="-1" width="1" height="1"/>
      <rect x="1" y="-2" width="1" height="1"/><rect x="0" y="-3" width="1" height="1"/>
    </g>
    <g class="error-x2">
      <rect x="15" y="-1" width="1" height="1"/><rect x="16" y="0" width="1" height="1"/>
      <rect x="17" y="-1" width="1" height="1"/><rect x="16" y="-2" width="1" height="1"/>
    </g>
  </g>
  <g class="error-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/>
      <rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/>
      <rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="10" width="2" height="2"/>
      <rect x="13" y="10" width="2" height="2"/>
    </g>
    <!-- X eyes -->
    <g fill="#FF0000">
      <rect x="4" y="7" width="1" height="1"/><rect x="6" y="7" width="1" height="1"/>
      <rect x="5" y="8" width="1" height="1"/>
      <rect x="4" y="9" width="1" height="1"/><rect x="6" y="9" width="1" height="1"/>
      <rect x="10" y="7" width="1" height="1"/><rect x="12" y="7" width="1" height="1"/>
      <rect x="11" y="8" width="1" height="1"/>
      <rect x="10" y="9" width="1" height="1"/><rect x="12" y="9" width="1" height="1"/>
    </g>
  </g>
</svg>
