<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .e503-body { transform-origin: 7.5px 15px; animation: e503-fade 3s infinite ease-in-out; }
      .e503-shadow { animation: e503-s 3s infinite ease-in-out; }
      .e503-text { animation: e503-flash 1.5s infinite; }
      @keyframes e503-fade { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
      @keyframes e503-s { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.1; } }
      @keyframes e503-flash { 0%, 60% { opacity: 1; } 30% { opacity: 0.4; } }
    </style>
  </defs>
  <rect class="e503-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- 503 text -->
  <g class="e503-text" fill="#FF8800">
    <!-- 5 -->
    <rect x="2" y="-3" width="3" height="1"/><rect x="2" y="-2" width="1" height="1"/><rect x="2" y="-1" width="3" height="1"/><rect x="4" y="0" width="1" height="1"/><rect x="2" y="1" width="3" height="1"/>
    <!-- 0 -->
    <rect x="6" y="-3" width="3" height="1"/><rect x="6" y="1" width="3" height="1"/><rect x="6" y="-3" width="1" height="5"/><rect x="8" y="-3" width="1" height="5"/>
    <!-- 3 -->
    <rect x="10" y="-3" width="3" height="1"/><rect x="10" y="-1" width="3" height="1"/><rect x="10" y="1" width="3" height="1"/><rect x="12" y="-3" width="1" height="5"/>
  </g>
  <!-- Wrench -->
  <g fill="#888">
    <rect x="17" y="7" width="1" height="5"/><rect x="16" y="6" width="1" height="2"/><rect x="18" y="6" width="1" height="2"/>
  </g>
  <g class="e503-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Sleepy closed eyes -->
    <g fill="#000">
      <rect x="4" y="9" width="2" height="1"/><rect x="10" y="9" width="2" height="1"/>
    </g>
  </g>
</svg>
