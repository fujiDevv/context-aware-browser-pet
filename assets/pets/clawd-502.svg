<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .e502-body { transform-origin: 7.5px 15px; animation: e502-glitch 0.3s infinite steps(2); }
      .e502-shadow { animation: e502-s 0.3s infinite; }
      .e502-text { animation: e502-flash 0.8s infinite; }
      @keyframes e502-glitch { 0% { transform: translate(0, 0); } 50% { transform: translate(1px, -1px); } }
      @keyframes e502-s { 0%, 100% { opacity: 0.5; } }
      @keyframes e502-flash { 0%, 40% { opacity: 1; } 20% { opacity: 0.2; } }
    </style>
  </defs>
  <rect class="e502-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- 502 text -->
  <g class="e502-text" fill="#FF4444">
    <!-- 5 -->
    <rect x="2" y="-3" width="3" height="1"/><rect x="2" y="-2" width="1" height="1"/><rect x="2" y="-1" width="3" height="1"/><rect x="4" y="0" width="1" height="1"/><rect x="2" y="1" width="3" height="1"/>
    <!-- 0 -->
    <rect x="6" y="-3" width="3" height="1"/><rect x="6" y="1" width="3" height="1"/><rect x="6" y="-3" width="1" height="5"/><rect x="8" y="-3" width="1" height="5"/>
    <!-- 2 -->
    <rect x="10" y="-3" width="3" height="1"/><rect x="12" y="-2" width="1" height="1"/><rect x="10" y="-1" width="3" height="1"/><rect x="10" y="0" width="1" height="1"/><rect x="10" y="1" width="3" height="1"/>
  </g>
  <g class="e502-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Glitched eyes (offset) -->
    <g fill="#000">
      <rect x="4" y="8" width="1" height="2"/><rect x="11" y="9" width="1" height="2"/>
    </g>
  </g>
</svg>
