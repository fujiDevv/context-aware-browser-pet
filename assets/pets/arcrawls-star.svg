<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .star-body { transform-origin: 7.5px 15px; animation: star-float 2s infinite ease-in-out; }
      .star-shadow { transform-origin: 7.5px 15.5px; animation: star-shadow 2s infinite ease-in-out; }
      .star-eyes { transform-origin: 7.5px 9px; animation: star-blink 3s infinite; }
      .halo-star { animation: halo-rotate 3s infinite linear; transform-origin: 7.5px -2px; }
      .twinkle1 { animation: twinkle 1.5s infinite ease-in-out; }
      .twinkle2 { animation: twinkle 1.5s infinite ease-in-out 0.5s; }
      .twinkle3 { animation: twinkle 1.5s infinite ease-in-out 1s; }
      @keyframes star-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
      @keyframes star-shadow { 0%, 100% { transform: scaleX(1); opacity: 0.5; } 50% { transform: scaleX(0.6); opacity: 0.2; } }
      @keyframes star-blink { 0%, 46%, 54%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
      @keyframes halo-rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
  </defs>
  <rect class="star-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Orbiting star -->
  <g class="halo-star">
    <g fill="#FFD700">
      <rect x="7" y="-5" width="1" height="3"/>
      <rect x="6" y="-4" width="3" height="1"/>
    </g>
  </g>
  <!-- Twinkles -->
  <rect class="twinkle1" x="-2" y="2" width="1" height="1" fill="#FFF"/>
  <rect class="twinkle2" x="16" y="0" width="1" height="1" fill="#FFF"/>
  <rect class="twinkle3" x="10" y="-4" width="1" height="1" fill="#FFF"/>
  <g class="star-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/>
      <rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/>
      <rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/>
      <rect x="13" y="9" width="2" height="2"/>
    </g>
    <g class="star-eyes" fill="#000">
      <rect x="4" y="8" width="1" height="2"/>
      <rect x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
