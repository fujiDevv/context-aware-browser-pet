<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .gift-body { transform-origin: 7.5px 15px; animation: gift-hop 1s infinite ease-in-out; }
      .gift-shadow { animation: gift-s 1s infinite; }
      .gift-eyes { transform-origin: 7.5px 9px; animation: gift-blink 3s infinite; }
      .gift-box { animation: gift-wiggle 0.5s infinite alternate ease-in-out; }
      @keyframes gift-hop { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-1px); } }
      @keyframes gift-s { 0%, 100% { opacity: 0.5; } }
      @keyframes gift-blink { 0%, 46%, 54%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
      @keyframes gift-wiggle { 0% { transform: rotate(-3deg); } 100% { transform: rotate(3deg); } }
    </style>
  </defs>
  <rect class="gift-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Gift box -->
  <g class="gift-box">
    <rect x="14" y="7" width="5" height="5" fill="#FF4444"/>
    <rect x="16" y="7" width="1" height="5" fill="#FFD700"/>
    <rect x="14" y="9" width="5" height="1" fill="#FFD700"/>
    <rect x="15" y="5" width="3" height="2" fill="#FFD700"/>
  </g>
  <g class="gift-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <g class="gift-eyes" fill="#000">
      <rect x="4" y="8" width="1" height="2"/><rect x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
