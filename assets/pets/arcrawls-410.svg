<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .e410-ghost { animation: e410-float 3s infinite ease-in-out; }
      .e410-arm { transform-origin: 14px 9px; animation: e410-wave 0.8s infinite alternate ease-in-out; }
      .e410-text { animation: e410-fade 2.5s infinite; }
      @keyframes e410-float { 0%, 100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-2px); opacity: 0.38; } }
      @keyframes e410-wave { 0% { transform: rotate(15deg); } 100% { transform: rotate(55deg); } }
      @keyframes e410-fade { 0%, 100% { opacity: 0.9; } 50% { opacity: 0.4; } }
    </style>
  </defs>

  <rect x="4" y="15" width="7" height="1" fill="#000" opacity="0.25"/>

  <!-- gravestone, low and behind -->
  <rect x="6" y="11" width="3" height="1" fill="#5E6B73"/>
  <rect x="5" y="12" width="5" height="4" fill="#6B7A82"/>
  <rect x="7" y="12" width="1" height="3" fill="#465056"/>
  <rect x="6" y="13" width="3" height="1" fill="#465056"/>

  <!-- 410 -->
  <g class="e410-text" fill="#B0BEC5">
    <rect x="2" y="-4" width="1" height="3"/><rect x="2" y="-1" width="3" height="1"/><rect x="4" y="-4" width="1" height="5"/>
    <rect x="7" y="-4" width="1" height="5"/><rect x="6" y="-3" width="1" height="1"/><rect x="6" y="0" width="3" height="1"/>
    <rect x="10" y="-4" width="3" height="1"/><rect x="10" y="0" width="3" height="1"/><rect x="10" y="-4" width="1" height="5"/><rect x="12" y="-4" width="1" height="5"/>
  </g>

  <!-- ghost clawd floating above the grave -->
  <g class="e410-ghost">
    <g fill="#DE886D">
      <rect x="2" y="4" width="11" height="6"/>
      <rect x="0" y="7" width="2" height="2"/>
      <rect x="2" y="10" width="2" height="1"/><rect x="5" y="10" width="2" height="1"/><rect x="8" y="10" width="2" height="1"/><rect x="11" y="10" width="2" height="1"/>
      <rect x="3" y="10" width="1" height="1"/><rect x="6" y="10" width="1" height="1"/><rect x="9" y="10" width="1" height="1"/><rect x="12" y="10" width="1" height="1"/>
    </g>
    <g fill="#000"><rect x="4" y="6" width="1" height="2"/><rect x="10" y="6" width="1" height="2"/></g>
    <g class="e410-arm"><rect x="13" y="7" width="2" height="2" fill="#DE886D"/></g>
  </g>
</svg>
