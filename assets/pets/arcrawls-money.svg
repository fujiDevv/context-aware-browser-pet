<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .money-body { transform-origin: 7.5px 15px; animation: money-bob 1s infinite ease-in-out; }
      .money-shadow { animation: money-s 1s infinite; }
      .money-eyes { animation: money-look 2s infinite ease-in-out; }
      .coin1 { animation: coin-fall 1.5s infinite ease-in; }
      .coin2 { animation: coin-fall 1.5s infinite ease-in 0.5s; }
      .coin3 { animation: coin-fall 1.5s infinite ease-in 1s; }
      @keyframes money-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-1px); } }
      @keyframes money-s { 0%, 100% { opacity: 0.5; } }
      @keyframes money-look { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(0.5px); } }
      @keyframes coin-fall { 0% { opacity: 0.8; transform: translateY(-8px); } 100% { opacity: 0; transform: translateY(10px); } }
    </style>
  </defs>
  <rect class="money-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Falling coins -->
  <g fill="#FFD700">
    <rect class="coin1" x="-1" y="0" width="2" height="2"/>
    <rect class="coin2" x="7" y="-2" width="2" height="2"/>
    <rect class="coin3" x="14" y="0" width="2" height="2"/>
  </g>
  <g class="money-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!--
      Left $ eye (5x7 grid starting at 3,7):
      Row 0:  .##.   top bar
      Row 1:  #...   left
      Row 2:  .#..   mid-left
      Row 3:  ..#.   mid-right
      Row 4:  ...#   right
      Row 5:  ##..   bottom bar
      Vertical line through col 1 full height
    -->
    <g class="money-eyes" fill="#44CC44">
      <!-- Left $ -->
      <rect x="4" y="7" width="2" height="1"/>
      <rect x="3" y="8" width="1" height="1"/>
      <rect x="4" y="9" width="2" height="1"/>
      <rect x="6" y="10" width="1" height="1"/>
      <rect x="3" y="11" width="2" height="1"/>
      <!-- Right $ -->
      <rect x="10" y="7" width="2" height="1"/>
      <rect x="9" y="8" width="1" height="1"/>
      <rect x="10" y="9" width="2" height="1"/>
      <rect x="12" y="10" width="1" height="1"/>
      <rect x="9" y="11" width="2" height="1"/>
    </g>
  </g>
</svg>
