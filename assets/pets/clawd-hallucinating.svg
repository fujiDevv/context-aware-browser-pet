<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .hal-body { transform-origin: 7.5px 15px; animation: hal-sway 3.5s infinite ease-in-out; }
      .hal-swirl-l { transform-origin: 4.5px 8.5px; animation: hal-spin 3s infinite linear; }
      .hal-swirl-r { transform-origin: 10.5px 8.5px; animation: hal-spin 3s infinite linear; }
      .hal-w1 { animation: hal-rise 3.6s infinite ease-in-out; }
      .hal-w2 { animation: hal-rise 3.6s infinite ease-in-out 1.2s; }
      .hal-w3 { animation: hal-rise 3.6s infinite ease-in-out 2.4s; }
      @keyframes hal-sway { 0%, 100% { transform: rotate(-4deg) translateY(0); } 50% { transform: rotate(4deg) translateY(-1px); } }
      @keyframes hal-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes hal-rise { 0% { transform: translateY(3px); opacity: 0; } 30% { opacity: 0.8; } 70% { opacity: 0.5; } 100% { transform: translateY(-7px); opacity: 0; } }
    </style>
  </defs>

  <rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>

  <!-- imaginary apparitions drifting up -->
  <g class="hal-w1" fill="#B39DDB"><rect x="-6" y="3" width="2" height="2"/><rect x="-6" y="5" width="1" height="1"/><rect x="-4" y="5" width="1" height="1"/></g>
  <g class="hal-w2" fill="#9575CD"><rect x="16" y="1" width="2" height="2"/><rect x="16" y="3" width="1" height="1"/><rect x="18" y="3" width="1" height="1"/></g>
  <g class="hal-w3" fill="#CE93D8"><rect x="6" y="-8" width="2" height="2"/><rect x="6" y="-6" width="1" height="1"/><rect x="8" y="-6" width="1" height="1"/></g>

  <g class="hal-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- hypnotized spiral eyes: gapped rings that spin -->
    <g class="hal-swirl-l" fill="#000"><rect x="4" y="7" width="1" height="1"/><rect x="5" y="7" width="1" height="1"/><rect x="5" y="8" width="1" height="1"/><rect x="5" y="9" width="1" height="1"/><rect x="4" y="9" width="1" height="1"/><rect x="3" y="9" width="1" height="1"/><rect x="3" y="8" width="1" height="1"/></g>
    <g class="hal-swirl-r" fill="#000"><rect x="10" y="7" width="1" height="1"/><rect x="11" y="7" width="1" height="1"/><rect x="11" y="8" width="1" height="1"/><rect x="11" y="9" width="1" height="1"/><rect x="10" y="9" width="1" height="1"/><rect x="9" y="9" width="1" height="1"/><rect x="9" y="8" width="1" height="1"/></g>
  </g>
</svg>
