<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .ctx-body { transform-origin: 7.5px 15px; animation: ctx-tremble 0.4s infinite ease-in-out; }
      .ctx-stack { transform-origin: 7.5px 6px; animation: ctx-teeter 2.6s infinite ease-in-out; }
      .ctx-sweat { animation: ctx-drip 2.2s infinite ease-in; }
      @keyframes ctx-tremble { 0%, 100% { transform: translateX(-0.2px); } 50% { transform: translateX(0.2px); } }
      @keyframes ctx-teeter { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
      @keyframes ctx-drip { 0%, 60% { transform: translateY(0); opacity: 0; } 70% { opacity: 0.9; } 100% { transform: translateY(4px); opacity: 0; } }
    </style>
  </defs>

  <rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>

  <g class="ctx-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- worried, looking up -->
    <g fill="#000">
      <rect x="5" y="8" width="1" height="2"/><rect x="5" y="8" width="2" height="1"/>
      <rect x="9" y="8" width="1" height="2"/><rect x="9" y="8" width="2" height="1"/>
    </g>
    <rect class="ctx-sweat" x="12" y="8" width="1" height="1" fill="#4FC3F7"/>

    <!-- teetering tower of context -->
    <g class="ctx-stack">
      <rect x="4" y="5" width="7" height="1" fill="#FFFFFF"/>
      <rect x="3" y="4" width="7" height="1" fill="#F0F0F0"/>
      <rect x="5" y="3" width="7" height="1" fill="#FFFFFF"/>
      <rect x="4" y="2" width="7" height="1" fill="#F0F0F0"/>
      <rect x="3" y="1" width="7" height="1" fill="#FFFFFF"/>
      <rect x="5" y="0" width="7" height="1" fill="#F0F0F0"/>
      <rect x="4" y="-1" width="7" height="1" fill="#FFFFFF"/>
      <rect x="3" y="-2" width="7" height="1" fill="#F0F0F0"/>
      <rect x="5" y="3" width="3" height="1" fill="#BDBDBD" opacity="0.5"/>
      <rect x="4" y="1" width="3" height="1" fill="#BDBDBD" opacity="0.5"/>
      <rect x="6" y="-1" width="3" height="1" fill="#BDBDBD" opacity="0.5"/>
    </g>
  </g>
</svg>
