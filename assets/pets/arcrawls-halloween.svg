<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .hw-body { transform-origin: 7.5px 15px; animation: hw-wobble 2s infinite ease-in-out; }
      .ghost { animation: ghost-float 3s infinite ease-in-out; }
      @keyframes hw-wobble { 0%, 100% { transform: rotate(-1deg); } 50% { transform: rotate(1deg); } }
      @keyframes ghost-float { 0%, 100% { transform: translate(0, 0); opacity: 0.7; } 50% { transform: translate(1px, -3px); opacity: 0.9; } }
    </style>
  </defs>
  <rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- ghost floating nearby -->
  <g class="ghost" fill="#FFFFFF" opacity="0.8">
    <rect x="-6" y="4" width="3" height="3"/>
    <rect x="-6" y="7" width="1" height="1"/><rect x="-4" y="7" width="1" height="1"/>
    <rect x="-6" y="5" width="1" height="1" fill="#000"/><rect x="-4" y="5" width="1" height="1" fill="#000"/>
  </g>
  <g class="hw-body">
    <!-- pumpkin hat -->
    <g fill="#FF8800">
      <rect x="4" y="3" width="7" height="3"/>
    </g>
    <rect x="7" y="1" width="1" height="2" fill="#44AA00"/>
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <g fill="#000">
      <!-- spooky triangle eyes -->
      <rect x="4" y="8" width="1" height="1"/><rect x="5" y="9" width="2" height="2"/><rect x="6" y="8" width="1" height="1"/>
      <rect x="10" y="8" width="1" height="1"/><rect x="10" y="9" width="2" height="2"/><rect x="11" y="8" width="1" height="1"/>
    </g>
  </g>
</svg>