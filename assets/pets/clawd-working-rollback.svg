<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .rbk-body { transform-origin: 7.5px 15px; animation: rbk-strain 2s infinite ease-in-out; }
      .rbk-hand { transform-origin: 7.5px -5px; animation: rbk-rewind 1.5s infinite linear; }
      .rbk-arrows { animation: rbk-pulse 1s infinite ease-in-out; }
      .rbk-sweat { animation: rbk-drip 2s infinite ease-in 0.5s; }
      @keyframes rbk-strain { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(-1deg); } }
      @keyframes rbk-rewind { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
      @keyframes rbk-pulse { 0%, 100% { opacity: 0.4; transform: translateX(0); } 50% { opacity: 1; transform: translateX(-1px); } }
      @keyframes rbk-drip { 0%, 55% { transform: translateY(0); opacity: 0; } 65% { opacity: 0.9; } 100% { transform: translateY(4px); opacity: 0; } }
    </style>
  </defs>

  <rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>

  <!-- clock running backward -->
  <rect x="4" y="-9" width="7" height="7" rx="1.5" fill="#90A4AE"/>
  <rect x="4.5" y="-8.5" width="6" height="6" rx="1.5" fill="#ECEFF1"/>
  <rect x="7" y="-8" width="1" height="1" fill="#B0BEC5"/>
  <rect x="7" y="-3" width="1" height="1" fill="#B0BEC5"/>
  <rect x="5" y="-5.5" width="1" height="1" fill="#B0BEC5"/>
  <rect x="9.5" y="-5.5" width="1" height="1" fill="#B0BEC5"/>
  <g class="rbk-hand"><rect x="7" y="-8" width="1" height="3" fill="#E53935"/></g>
  <rect x="7" y="-6" width="1" height="1" fill="#37474F"/>

  <!-- rewind arrows -->
  <g class="rbk-arrows" fill="#5C6BC0">
    <polygon points="-1,-7 -1,-3 -4,-5"/>
    <polygon points="2,-7 2,-3 -1,-5"/>
  </g>

  <g class="rbk-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="8" width="2" height="2"/><rect x="13" y="8" width="2" height="2"/>
    </g>
    <g fill="#000"><rect x="4" y="8" width="1" height="1"/><rect x="10" y="8" width="1" height="1"/></g>
    <rect class="rbk-sweat" x="12" y="8" width="1" height="1" fill="#4FC3F7"/>
  </g>
</svg>
