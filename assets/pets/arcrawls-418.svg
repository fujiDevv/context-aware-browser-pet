<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .e418-body { transform-origin: 7.5px 15px; animation: e418-wobble 2s infinite ease-in-out; }
      .e418-shadow { opacity: 0.5; }
      .e418-text { animation: e418-flash 2s infinite; }
      .e418-steam1 { animation: e418-rise 1.5s infinite ease-out; }
      .e418-steam2 { animation: e418-rise 1.5s infinite ease-out 0.5s; }
      .e418-steam3 { animation: e418-rise 1.5s infinite ease-out 1s; }
      @keyframes e418-wobble { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-2deg); } 75% { transform: rotate(2deg); } }
      @keyframes e418-flash { 0%, 70% { opacity: 1; } 35% { opacity: 0.3; } }
      @keyframes e418-rise { 0% { transform: translateY(0); opacity: 0.8; } 100% { transform: translateY(-6px); opacity: 0; } }
    </style>
  </defs>
  <rect class="e418-shadow" x="3" y="15" width="9" height="1" fill="#000"/>
  <!-- 418 text above -->
  <g class="e418-text" fill="#44AAAA">
    <!-- 4 -->
    <rect x="2" y="-3" width="1" height="3"/><rect x="2" y="-1" width="3" height="1"/>
    <rect x="4" y="-3" width="1" height="5"/>
    <!-- 1 -->
    <rect x="7" y="-3" width="1" height="5"/><rect x="6" y="-2" width="1" height="1"/>
    <rect x="6" y="1" width="3" height="1"/>
    <!-- 8 -->
    <rect x="10" y="-3" width="3" height="1"/><rect x="10" y="-1" width="3" height="1"/>
    <rect x="10" y="1" width="3" height="1"/>
    <rect x="10" y="-3" width="1" height="5"/><rect x="12" y="-3" width="1" height="5"/>
  </g>
  <!-- Steam -->
  <g fill="#CCC">
    <rect class="e418-steam1" x="5" y="2" width="1" height="2"/>
    <rect class="e418-steam2" x="7" y="1" width="1" height="2"/>
    <rect class="e418-steam3" x="9" y="2" width="1" height="2"/>
  </g>
  <g class="e418-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <!-- Handle (left) -->
      <rect x="-1" y="8" width="3" height="1"/>
      <rect x="-1" y="8" width="1" height="3"/>
      <rect x="-1" y="11" width="3" height="1"/>
      <!-- Spout (right) -->
      <rect x="13" y="9" width="2" height="1"/>
      <rect x="15" y="8" width="1" height="1"/>
      <rect x="16" y="7" width="1" height="1"/>
    </g>
    <!-- Teapot lid -->
    <rect x="4" y="5" width="7" height="1" fill="#C77A5E"/>
    <rect x="6" y="4" width="3" height="1" fill="#C77A5E"/>
    <!-- Eyes -->
    <g fill="#000">
      <rect x="5" y="8" width="1" height="2"/><rect x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
