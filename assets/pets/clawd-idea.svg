<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .idea-body { transform-origin: 7.5px 15px; animation: idea-perk 2s infinite ease-in-out; }
      .idea-shadow { transform-origin: 7.5px 15.5px; animation: idea-shadow 2s infinite ease-in-out; }
      .idea-eyes { transform-origin: 7.5px 9px; animation: idea-blink 3s infinite; }
      .bulb { animation: bulb-glow 1s infinite ease-in-out; }
      .bulb-ray1 { animation: ray-pulse 1s infinite ease-in-out; }
      .bulb-ray2 { animation: ray-pulse 1s infinite ease-in-out 0.25s; }
      .bulb-ray3 { animation: ray-pulse 1s infinite ease-in-out 0.5s; }
      .bulb-ray4 { animation: ray-pulse 1s infinite ease-in-out 0.75s; }
      @keyframes idea-perk { 0%, 100% { transform: translateY(0); } 30% { transform: translateY(-2px); } }
      @keyframes idea-shadow { 0%, 100% { transform: scaleX(1); opacity: 0.5; } 30% { transform: scaleX(0.85); opacity: 0.35; } }
      @keyframes idea-blink { 0%, 46%, 54%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
      @keyframes bulb-glow { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
      @keyframes ray-pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 0.8; transform: scale(1.1); } }
    </style>
  </defs>
  <rect class="idea-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Light bulb -->
  <g class="bulb">
    <rect x="6" y="-5" width="3" height="4" fill="#FFD700"/>
    <rect x="5" y="-4" width="5" height="2" fill="#FFD700"/>
    <rect x="7" y="-1" width="1" height="1" fill="#AAA"/>
  </g>
  <!-- Rays -->
  <rect class="bulb-ray1" x="4" y="-4" width="1" height="1" fill="#FFF59D"/>
  <rect class="bulb-ray2" x="10" y="-4" width="1" height="1" fill="#FFF59D"/>
  <rect class="bulb-ray3" x="7" y="-7" width="1" height="1" fill="#FFF59D"/>
  <rect class="bulb-ray4" x="3" y="-6" width="1" height="1" fill="#FFF59D"/>
  <g class="idea-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/>
      <rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/>
      <rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/>
      <rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Eyes looking up at bulb -->
    <g class="idea-eyes" fill="#000">
      <rect x="5" y="7" width="1" height="2"/>
      <rect x="11" y="7" width="1" height="2"/>
    </g>
  </g>
</svg>
