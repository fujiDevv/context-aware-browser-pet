<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .love-body { transform-origin: 7.5px 15px; animation: love-sway 2s infinite ease-in-out; }
      .love-shadow { transform-origin: 7.5px 15.5px; animation: love-shadow 2s infinite ease-in-out; }
      .love-eyes { transform-origin: 7.5px 9px; animation: love-blink 4s infinite; }
      .heart1 { animation: heart-float 2s infinite ease-out; }
      .heart2 { animation: heart-float 2s infinite ease-out 0.7s; }
      .heart3 { animation: heart-float 2s infinite ease-out 1.4s; }
      @keyframes love-sway { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-3deg); } 75% { transform: rotate(3deg); } }
      @keyframes love-shadow { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.45; } }
      @keyframes love-blink { 0%, 46%, 54%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
      @keyframes heart-float { 0% { opacity: 0.9; transform: translate(0, 0) scale(0.5); } 100% { opacity: 0; transform: translate(1px, -8px) scale(1.2); } }
    </style>
  </defs>
  <rect class="love-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Floating hearts -->
  <g fill="#FF4466">
    <g class="heart1">
      <rect x="13" y="0" width="1" height="1"/><rect x="15" y="0" width="1" height="1"/>
      <rect x="12" y="1" width="2" height="1"/><rect x="14" y="1" width="2" height="1"/>
      <rect x="12" y="2" width="4" height="1"/>
      <rect x="13" y="3" width="2" height="1"/>
      <rect x="13.5" y="4" width="1" height="1"/>
    </g>
    <g class="heart2">
      <rect x="-2" y="-1" width="1" height="1"/><rect x="0" y="-1" width="1" height="1"/>
      <rect x="-3" y="0" width="2" height="1"/><rect x="-1" y="0" width="2" height="1"/>
      <rect x="-3" y="1" width="4" height="1"/>
      <rect x="-2" y="2" width="2" height="1"/>
      <rect x="-1.5" y="3" width="1" height="1"/>
    </g>
    <g class="heart3">
      <rect x="8" y="-4" width="1" height="1"/><rect x="10" y="-4" width="1" height="1"/>
      <rect x="7" y="-3" width="2" height="1"/><rect x="9" y="-3" width="2" height="1"/>
      <rect x="7" y="-2" width="4" height="1"/>
      <rect x="8" y="-1" width="2" height="1"/>
    </g>
  </g>
  <g class="love-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/>
      <rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/>
      <rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/>
      <rect x="13" y="9" width="2" height="2"/>
    </g>
    <g class="love-eyes" fill="#000">
      <rect x="4" y="8" width="1" height="2"/>
      <rect x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
