<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs><style>
    .dj-body { transform-origin: 7.5px 10px; animation: dj-bob 0.5s ease-in-out infinite; }
    .dj-shadow { animation: dj-s 0.5s ease-in-out infinite; }
    .dj-arm-l { transform-origin: 1px 10px; animation: dj-scratch 0.4s ease-in-out infinite alternate; }
    @keyframes dj-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-0.5px); } }
    @keyframes dj-s { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.45; } }
    @keyframes dj-scratch { 0% { transform: translateX(-1px); } 100% { transform: translateX(1px); } }
  </style></defs>
  <rect class="dj-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Turntable -->
  <rect x="-8" y="12" width="10" height="4" fill="#333"/>
  <rect x="-6" y="13" width="4" height="2" fill="#444"/>
  <rect x="-5" y="13.5" width="2" height="1" rx="0.5" fill="#555"/>
  <rect x="-4" y="14" width="1" height="0.5" fill="#888"/>
  <!-- Turntable arm -->
  <rect x="-3" y="12" width="1" height="2" fill="#777"/>
  <g class="dj-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Left arm on turntable -->
    <g class="dj-arm-l">
      <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
    </g>
    <!-- Headphones -->
    <rect x="2" y="5" width="11" height="1" fill="#333"/>
    <rect x="1" y="6" width="2" height="2" fill="#444"/>
    <rect x="12" y="6" width="2" height="2" fill="#444"/>
    <g fill="#000">
      <rect x="5" y="9" width="1" height="2"/><rect x="10" y="9" width="1" height="2"/>
    </g>
  </g>
</svg>