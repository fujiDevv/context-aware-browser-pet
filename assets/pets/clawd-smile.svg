<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .smile-body { transform-origin: 7.5px 15px; animation: smile-idle 2.5s infinite ease-in-out; }
      .smile-shadow { animation: smile-s 2.5s infinite ease-in-out; }
      .smile-blink { transform-origin: 7.5px 9px; animation: smile-bl 3s infinite; }
      .smile-cheek { animation: smile-blush 2s infinite ease-in-out; }
      @keyframes smile-idle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-1.5px); } }
      @keyframes smile-s { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(0.9); opacity: 0.35; } }
      @keyframes smile-bl { 0%, 42%, 58%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
      @keyframes smile-blush { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.6; } }
    </style>
  </defs>
  <rect class="smile-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <g class="smile-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Blush cheeks -->
    <rect class="smile-cheek" x="3" y="10" width="2" height="1" fill="#FF9999" opacity="0.4"/>
    <rect class="smile-cheek" x="10" y="10" width="2" height="1" fill="#FF9999" opacity="0.4"/>
    <!-- Happy squint eyes (curved/closed smile eyes) -->
    <g class="smile-blink" fill="#000">
      <rect x="4" y="8" width="2" height="1"/><rect x="9" y="8" width="2" height="1"/>
    </g>
    <!-- Smile mouth -->
    <g fill="#000" opacity="0.7">
      <rect x="6" y="11" width="3" height="1"/>
      <rect x="5" y="10" width="1" height="1"/><rect x="9" y="10" width="1" height="1"/>
    </g>
  </g>
</svg>
