<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .confused-body { transform-origin: 7.5px 15px; animation: confused-tilt 2s infinite ease-in-out; }
      .confused-shadow { animation: confused-s 2s infinite ease-in-out; }
      .question-mark { animation: question-bob 1.2s infinite ease-in-out; }
      @keyframes confused-tilt { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
      @keyframes confused-s { 0%, 100% { opacity: 0.5; transform: scaleX(1); } 50% { opacity: 0.4; transform: scaleX(0.95); } }
      @keyframes question-bob { 0%, 100% { transform: translateY(0); opacity: 0.9; } 50% { transform: translateY(-2px); opacity: 1; } }
    </style>
  </defs>
  <rect class="confused-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <g class="question-mark" fill="#FFD700">
    <rect x="7" y="0" width="3" height="1"/>
    <rect x="10" y="1" width="1" height="1"/>
    <rect x="9" y="2" width="1" height="1"/>
    <rect x="8" y="3" width="1" height="1"/>
    <rect x="8" y="5" width="1" height="1"/>
  </g>
  <g class="confused-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <g fill="#000">
      <rect x="5" y="8" width="1" height="2"/>
      <rect x="10" y="9" width="1" height="2"/>
    </g>
  </g>
</svg>
