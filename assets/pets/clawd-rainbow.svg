<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .rain-body { transform-origin: 7.5px 15px; animation: rain-bob 2s infinite ease-in-out; }
      .rain-shadow { animation: rain-s 2s infinite; }
      .rain-eyes { transform-origin: 7.5px 9px; animation: rain-blink 4s infinite; }
      .rainbow { animation: rainbow-appear 3s infinite ease-in-out; }
      @keyframes rain-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-1px); } }
      @keyframes rain-s { 0%, 100% { opacity: 0.5; } }
      @keyframes rain-blink { 0%, 46%, 54%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
      @keyframes rainbow-appear { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
  </defs>
  <rect class="rain-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Rainbow arc -->
  <g class="rainbow">
    <rect x="-4" y="-2" width="23" height="1" fill="#FF4444" opacity="0.6"/>
    <rect x="-3" y="-3" width="21" height="1" fill="#FF8800" opacity="0.6"/>
    <rect x="-2" y="-4" width="19" height="1" fill="#FFD700" opacity="0.6"/>
    <rect x="-1" y="-5" width="17" height="1" fill="#44CC44" opacity="0.6"/>
    <rect x="0" y="-6" width="15" height="1" fill="#4488FF" opacity="0.6"/>
    <rect x="1" y="-7" width="13" height="1" fill="#8844FF" opacity="0.6"/>
  </g>
  <g class="rain-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <g class="rain-eyes" fill="#000">
      <rect x="4" y="8" width="1" height="2"/><rect x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
