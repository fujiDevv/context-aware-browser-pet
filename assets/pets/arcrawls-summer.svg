<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .sum-body { transform-origin: 7.5px 15px; animation: sum-chill 3s infinite ease-in-out; }
      .sun-rays { animation: sun-spin 6s infinite linear; transform-origin: -8px -14px; }
      @keyframes sum-chill { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(1deg); } }
      @keyframes sun-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </defs>
  <rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- sun -->
  <g>
    <rect x="-10" y="-16" width="4" height="4" fill="#FFDD00" rx="1"/>
    <g class="sun-rays" fill="#FFDD00" opacity="0.7">
      <rect x="-9" y="-20" width="2" height="2"/><rect x="-9" y="-10" width="2" height="2"/>
      <rect x="-14" y="-15" width="2" height="2"/><rect x="-4" y="-15" width="2" height="2"/>
    </g>
  </g>
  <g class="sum-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- sunglasses -->
    <g fill="#222">
      <rect x="4" y="8" width="3" height="2"/><rect x="9" y="8" width="3" height="2"/>
      <rect x="7" y="8" width="2" height="1"/>
    </g>
  </g>
</svg>