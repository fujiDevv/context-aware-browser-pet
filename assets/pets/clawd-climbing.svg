<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs><style>
    .climb-body { transform-origin: 7.5px 10px; animation: climb-move 1.5s ease-in-out infinite; }
    .climb-shadow { opacity: 0.3; animation: climb-s 1.5s ease-in-out infinite; }
    @keyframes climb-move { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
    @keyframes climb-s { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.2; } }
  </style></defs>
  <rect class="climb-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.3"/>
  <!-- Wall / climbing surface -->
  <rect x="-8" y="-10" width="4" height="26" fill="#8B7355"/>
  <rect x="-7" y="-8" width="2" height="2" fill="#A0896C"/>
  <rect x="-7" y="-3" width="2" height="2" fill="#A0896C"/>
  <rect x="-7" y="2" width="2" height="2" fill="#A0896C"/>
  <rect x="-7" y="7" width="2" height="2" fill="#A0896C"/>
  <rect x="-7" y="12" width="2" height="2" fill="#A0896C"/>
  <!-- Rope -->
  <rect x="-5" y="-10" width="1" height="26" fill="#C4A35A"/>
  <g class="climb-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Left arm reaching up to grip wall -->
    <rect x="0" y="6" width="2" height="2" fill="#DE886D"/>
    <rect x="-2" y="5" width="2" height="2" fill="#DE886D"/>
    <g fill="#000">
      <rect x="5" y="9" width="1" height="2"/><rect x="10" y="9" width="1" height="2"/>
    </g>
  </g>
</svg>