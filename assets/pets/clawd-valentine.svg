<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .val-body { transform-origin: 7.5px 15px; animation: val-bounce 1s infinite ease-in-out; }
      .heart1 { animation: heart-float 2s infinite ease-out; }
      .heart2 { animation: heart-float 2s infinite ease-out 0.5s; }
      .heart3 { animation: heart-float 2s infinite ease-out 1s; }
      .heart4 { animation: heart-float 2s infinite ease-out 1.5s; }
      @keyframes val-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-1px); } }
      @keyframes heart-float { 0% { opacity: 0.9; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-10px) scale(0.5); } }
    </style>
  </defs>
  <rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- floating hearts -->
  <g class="heart1" fill="#FF4466">
    <rect x="-2" y="2" width="1" height="1"/><rect x="0" y="2" width="1" height="1"/>
    <rect x="-3" y="3" width="3" height="1"/><rect x="-2" y="4" width="1" height="1"/>
  </g>
  <g class="heart2" fill="#FF4466">
    <rect x="14" y="-1" width="1" height="1"/><rect x="16" y="-1" width="1" height="1"/>
    <rect x="13" y="0" width="3" height="1"/><rect x="14" y="1" width="1" height="1"/>
  </g>
  <g class="heart3" fill="#FF4466">
    <rect x="5" y="-3" width="1" height="1"/><rect x="7" y="-3" width="1" height="1"/>
    <rect x="4" y="-2" width="3" height="1"/><rect x="5" y="-1" width="1" height="1"/>
  </g>
  <g class="heart4" fill="#FF4466">
    <rect x="-5" y="-2" width="1" height="1"/><rect x="-3" y="-2" width="1" height="1"/>
    <rect x="-6" y="-1" width="3" height="1"/><rect x="-5" y="0" width="1" height="1"/>
  </g>
  <g class="val-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <g fill="#000">
      <!-- happy eyes (curved) -->
      <rect x="5" y="9" width="2" height="1"/><rect x="4" y="8" width="1" height="1"/>
      <rect x="10" y="9" width="2" height="1"/><rect x="12" y="8" width="1" height="1"/>
    </g>
  </g>
</svg>