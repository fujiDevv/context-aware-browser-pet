<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .tele-body { transform-origin: 7.5px 15px; animation: tele-look 5s infinite ease-in-out; }
      .tele-shadow { animation: tele-s 5s infinite; }
      .tele-eyes { animation: tele-peer 5s infinite ease-in-out; }
      .star-a { animation: star-tw 1.5s infinite ease-in-out; }
      .star-b { animation: star-tw 1.5s infinite ease-in-out 0.5s; }
      .star-c { animation: star-tw 1.5s infinite ease-in-out 1s; }
      .star-d { animation: star-tw 1.5s infinite ease-in-out 0.3s; }
      .star-e { animation: star-tw 1.5s infinite ease-in-out 0.8s; }
      @keyframes tele-look { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(2deg); } }
      @keyframes tele-s { 0%, 100% { opacity: 0.5; } }
      @keyframes tele-peer { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(1px); } }
      @keyframes star-tw { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
  </defs>
  <rect class="tele-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Stars -->
  <rect class="star-a" x="-4" y="-8" width="1" height="1" fill="#FFF"/>
  <rect class="star-b" x="3" y="-10" width="1" height="1" fill="#FFF"/>
  <rect class="star-c" x="12" y="-7" width="1" height="1" fill="#FFD700"/>
  <rect class="star-d" x="18" y="-9" width="1" height="1" fill="#FFF"/>
  <rect class="star-e" x="8" y="-12" width="1" height="1" fill="#FFD700"/>
  <!-- Telescope -->
  <rect x="14" y="6" width="5" height="2" fill="#555"/>
  <rect x="19" y="5" width="2" height="4" fill="#444"/>
  <rect x="16" y="8" width="1" height="5" fill="#666"/>
  <rect x="14" y="13" width="5" height="1" fill="#666"/>
  <g class="tele-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <g class="tele-eyes" fill="#000">
      <rect x="4" y="8" width="1" height="2"/><rect x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
