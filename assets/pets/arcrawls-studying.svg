<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs><style>
    .study-body { transform-origin: 7.5px 10px; animation: study-bob 2s ease-in-out infinite; }
    .study-shadow { animation: study-s 2s ease-in-out infinite; }
    @keyframes study-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-0.5px); } }
    @keyframes study-s { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.4; } }
  </style></defs>
  <rect class="study-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Books stacked -->
  <rect x="-10" y="11" width="5" height="2" fill="#4A90D9"/>
  <rect x="-10" y="9" width="5" height="2" fill="#E74C3C"/>
  <rect x="-10" y="7" width="5" height="2" fill="#2ECC71"/>
  <!-- Notes page -->
  <rect x="-9" y="5" width="3" height="2" fill="#FFF" opacity="0.8"/>
  <rect x="-8" y="5.5" width="1" height="0.3" fill="#333"/>
  <rect x="-8" y="6.2" width="1" height="0.3" fill="#333"/>
  <g class="study-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <g fill="#000">
      <rect x="5" y="9" width="1" height="2"/><rect x="10" y="9" width="1" height="2"/>
    </g>
  </g>
</svg>