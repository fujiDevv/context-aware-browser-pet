<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs><style>
    .magic-body { transform-origin: 7.5px 15px; animation: magic-sway 2s ease-in-out infinite; }
    .magic-shadow { animation: magic-s 2s ease-in-out infinite; }
    .magic-spark1 { animation: magic-sparkle1 1s ease-in-out infinite; }
    .magic-spark2 { animation: magic-sparkle2 1s ease-in-out 0.3s infinite; }
    .magic-spark3 { animation: magic-sparkle3 1s ease-in-out 0.6s infinite; }
    @keyframes magic-sway { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(1.5deg); } }
    @keyframes magic-s { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.45; } }
    @keyframes magic-sparkle1 { 0%, 100% { transform: translate(0, 0); opacity: 1; } 50% { transform: translate(-2px, -3px); opacity: 0; } }
    @keyframes magic-sparkle2 { 0%, 100% { transform: translate(0, 0); opacity: 1; } 50% { transform: translate(2px, -4px); opacity: 0; } }
    @keyframes magic-sparkle3 { 0%, 100% { transform: translate(0, 0); opacity: 1; } 50% { transform: translate(-1px, -5px); opacity: 0; } }
  </style></defs>
  <rect class="magic-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Sparkles from wand tip -->
  <rect class="magic-spark1" x="-4" y="5" width="1" height="1" fill="#FFD700"/>
  <rect class="magic-spark2" x="-6" y="4" width="1" height="1" fill="#FF69B4"/>
  <rect class="magic-spark3" x="-3" y="3" width="1" height="1" fill="#00FFFF"/>
  <g class="magic-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Wizard hat -->
    <rect x="3" y="5" width="9" height="1" fill="#7D3C98"/>
    <rect x="4" y="3" width="7" height="2" fill="#7D3C98"/>
    <rect x="5" y="1" width="5" height="2" fill="#8E44AD"/>
    <rect x="6" y="-1" width="3" height="2" fill="#8E44AD"/>
    <rect x="7" y="-2" width="1" height="1" fill="#9B59B6"/>
    <!-- Star on hat -->
    <rect x="7" y="0" width="1" height="1" fill="#FFD700"/>
    <!-- Wand in left hand -->
    <rect x="-2" y="7" width="1" height="4" fill="#333"/>
    <rect x="-2" y="6" width="1" height="1" fill="#FFF"/>
    <g fill="#000">
      <rect x="5" y="9" width="1" height="2"/><rect x="10" y="9" width="1" height="2"/>
    </g>
  </g>
</svg>