<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs><style>
    .time-body { transform-origin: 7.5px 10px; animation: time-phase 3s ease-in-out infinite; }
    .time-shadow { animation: time-s 3s ease-in-out infinite; }
    .time-ring { transform-origin: 7.5px 10px; animation: time-rotate 4s linear infinite; }
    .time-spark1 { animation: time-sp1 2s ease-in-out infinite; }
    .time-spark2 { animation: time-sp2 2s ease-in-out 0.5s infinite; }
    .time-spark3 { animation: time-sp3 2s ease-in-out 1s infinite; }
    .time-spark4 { animation: time-sp4 2s ease-in-out 1.5s infinite; }
    @keyframes time-phase { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes time-s { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.2; } }
    @keyframes time-rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes time-sp1 { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    @keyframes time-sp2 { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.1; } }
    @keyframes time-sp3 { 0%, 100% { opacity: 0.9; } 50% { opacity: 0.3; } }
    @keyframes time-sp4 { 0%, 100% { opacity: 0.7; } 50% { opacity: 0.15; } }
  </style></defs>
  <rect class="time-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Rotating ring of colored dots -->
  <g class="time-ring">
    <rect class="time-spark1" x="7" y="-4" width="2" height="2" fill="#FFD700"/>
    <rect class="time-spark2" x="17" y="9" width="2" height="2" fill="#FF69B4"/>
    <rect class="time-spark3" x="7" y="20" width="2" height="2" fill="#00FFFF"/>
    <rect class="time-spark4" x="-4" y="9" width="2" height="2" fill="#9B59B6"/>
    <rect x="14" y="0" width="1" height="1" fill="#2ECC71"/>
    <rect x="14" y="18" width="1" height="1" fill="#E74C3C"/>
    <rect x="0" y="0" width="1" height="1" fill="#3498DB"/>
    <rect x="0" y="18" width="1" height="1" fill="#F39C12"/>
  </g>
  <g class="time-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <g fill="#000">
      <rect x="5" y="9" width="1" height="2"/><rect x="10" y="9" width="1" height="2"/>
    </g>
  </g>
</svg>