<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .e500-body { transform-origin: 7.5px 15px; animation: e500-shake 0.1s infinite alternate; }
      .e500-shadow { animation: e500-s 1s infinite; }
      .e500-text { animation: e500-flash 1s infinite; }
      .e500-bg { animation: e500-red 1s infinite; }
      @keyframes e500-shake { 0% { transform: translateX(-1px); } 100% { transform: translateX(1px); } }
      @keyframes e500-s { 0%, 49% { fill: #FF0000; opacity: 0.3; } 50%, 100% { fill: #000; opacity: 0.5; } }
      @keyframes e500-flash { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0.3; } }
      @keyframes e500-red { 0%, 49% { opacity: 0.1; } 50%, 100% { opacity: 0; } }
    </style>
  </defs>
  <rect class="e500-bg" x="-15" y="-25" width="45" height="45" fill="#FF0000"/>
  <rect class="e500-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- 500 text -->
  <g class="e500-text" fill="#FF0000">
    <!-- 5 -->
    <rect x="2" y="-3" width="3" height="1"/><rect x="2" y="-2" width="1" height="1"/><rect x="2" y="-1" width="3" height="1"/><rect x="4" y="0" width="1" height="1"/><rect x="2" y="1" width="3" height="1"/>
    <!-- 0 -->
    <rect x="6" y="-3" width="3" height="1"/><rect x="6" y="1" width="3" height="1"/><rect x="6" y="-3" width="1" height="5"/><rect x="8" y="-3" width="1" height="5"/>
    <!-- 0 -->
    <rect x="10" y="-3" width="3" height="1"/><rect x="10" y="1" width="3" height="1"/><rect x="10" y="-3" width="1" height="5"/><rect x="12" y="-3" width="1" height="5"/>
  </g>
  <g class="e500-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="10" width="2" height="2"/><rect x="13" y="10" width="2" height="2"/>
    </g>
    <!-- X eyes -->
    <g fill="#FF0000">
      <rect x="4" y="7" width="1" height="1"/><rect x="6" y="7" width="1" height="1"/>
      <rect x="5" y="8" width="1" height="1"/>
      <rect x="4" y="9" width="1" height="1"/><rect x="6" y="9" width="1" height="1"/>
      <rect x="10" y="7" width="1" height="1"/><rect x="12" y="7" width="1" height="1"/>
      <rect x="11" y="8" width="1" height="1"/>
      <rect x="10" y="9" width="1" height="1"/><rect x="12" y="9" width="1" height="1"/>
    </g>
  </g>
</svg>
