<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .pirate-body { transform-origin: 7.5px 15px; animation: pirate-sway 2s infinite ease-in-out; }
      .pirate-shadow { animation: pirate-s 2s infinite; }
      .pirate-eyes { transform-origin: 7.5px 9px; animation: pirate-blink 4s infinite; }
      @keyframes pirate-sway { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-3deg); } 75% { transform: rotate(3deg); } }
      @keyframes pirate-s { 0%, 100% { opacity: 0.5; } }
      @keyframes pirate-blink { 0%, 46%, 54%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
    </style>
  </defs>
  <rect class="pirate-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <g class="pirate-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Pirate hat -->
    <rect x="2" y="4" width="11" height="2" fill="#222"/>
    <rect x="4" y="2" width="7" height="3" fill="#222"/>
    <!-- Skull on hat -->
    <rect x="6" y="3" width="3" height="2" fill="#FFF"/><rect x="7" y="2" width="1" height="1" fill="#FFF"/>
    <!-- Eye patch -->
    <rect x="3" y="7" width="3" height="3" fill="#222"/>
    <rect x="6" y="8" width="1" height="1" fill="#222"/>
    <!-- Good eye -->
    <g class="pirate-eyes" fill="#000">
      <rect x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
