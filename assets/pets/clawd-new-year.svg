<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .ny-body { transform-origin: 7.5px 15px; animation: ny-bounce 0.5s infinite ease-in-out; }
      .conf1 { animation: confetti-fall 2.5s infinite linear; }
      .conf2 { animation: confetti-fall 2.5s infinite linear 0.4s; }
      .conf3 { animation: confetti-fall 2.5s infinite linear 0.8s; }
      .conf4 { animation: confetti-fall 2.5s infinite linear 1.2s; }
      .conf5 { animation: confetti-fall 2.5s infinite linear 1.6s; }
      .conf6 { animation: confetti-fall 2.5s infinite linear 2s; }
      @keyframes ny-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
      @keyframes confetti-fall { 0% { transform: translateY(-12px) rotate(0deg); opacity: 1; } 100% { transform: translateY(18px) rotate(180deg); opacity: 0; } }
    </style>
  </defs>
  <rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- confetti -->
  <rect class="conf1" x="-4" y="-5" width="1" height="2" fill="#FF4466"/>
  <rect class="conf2" x="1" y="-8" width="2" height="1" fill="#44AAFF"/>
  <rect class="conf3" x="8" y="-10" width="1" height="2" fill="#FFDD00"/>
  <rect class="conf4" x="15" y="-6" width="2" height="1" fill="#AA44FF"/>
  <rect class="conf5" x="18" y="-9" width="1" height="2" fill="#44FF88"/>
  <rect class="conf6" x="-7" y="-11" width="2" height="1" fill="#FF8844"/>
  <g class="ny-body">
    <!-- party hat -->
    <g>
      <rect x="4" y="4" width="7" height="2" fill="#FFDD00"/>
      <rect x="5" y="2" width="5" height="2" fill="#AA44FF"/>
      <rect x="7" y="0" width="1" height="2" fill="#44AAFF"/>
    </g>
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <g fill="#000">
      <!-- excited eyes -->
      <rect x="5" y="9" width="1" height="2"/><rect x="10" y="9" width="1" height="2"/>
    </g>
  </g>
</svg>