<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .fp-body { transform-origin: 7.5px 15px; animation: fp-sigh 4s infinite ease-in-out; }
      .fp-shadow { animation: fp-s 4s infinite; }
      @keyframes fp-sigh { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(0.5px); } }
      @keyframes fp-s { 0%, 100% { opacity: 0.5; } }
    </style>
  </defs>
  <rect class="fp-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <g class="fp-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="13" y="9" width="2" height="2"/>
      <!-- Hand covering face -->
      <rect x="0" y="7" width="7" height="3"/>
    </g>
    <!-- One visible eye peeking through -->
    <g fill="#000">
      <rect x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
