<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .oc-body { transform-origin: 7.5px 15px; animation: oc-shake 0.5s infinite ease-in-out; }
      .oc-shadow { opacity: 0.5; }
      .oc-phone { animation: oc-vibrate 0.15s infinite alternate; }
      .oc-alert { animation: oc-flash 0.8s infinite; }
      @keyframes oc-shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-1deg); } 75% { transform: rotate(1deg); } }
      @keyframes oc-vibrate { 0% { transform: translate(-1px, 0); } 100% { transform: translate(1px, 0); } }
      @keyframes oc-flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
  </defs>
  <rect class="oc-shadow" x="3" y="15" width="9" height="1" fill="#000"/>
  <!-- Alert triangle -->
  <g class="oc-alert" fill="#FF0">
    <rect x="6" y="-6" width="3" height="1"/>
    <rect x="5" y="-5" width="5" height="1"/>
    <rect x="4" y="-4" width="7" height="1"/>
    <rect x="3" y="-3" width="9" height="1"/>
    <!-- ! mark -->
    <rect x="7" y="-5" width="1" height="2" fill="#000"/>
    <rect x="7" y="-2" width="1" height="1" fill="#000"/>
  </g>
  <!-- Phone/pager near hand -->
  <g class="oc-phone">
    <rect x="-4" y="8" width="3" height="4" fill="#333"/>
    <rect x="-3" y="9" width="1" height="2" fill="#0F0"/>
  </g>
  <g class="oc-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Stressed eyes (wide, worried) -->
    <g fill="#000">
      <rect x="4" y="8" width="2" height="3"/><rect x="9" y="8" width="2" height="3"/>
    </g>
    <g fill="#fff">
      <rect x="4" y="8" width="1" height="1"/><rect x="9" y="8" width="1" height="1"/>
    </g>
    <!-- Sweat drop -->
    <rect x="13" y="7" width="1" height="2" fill="#5BF"/>
  </g>
</svg>
