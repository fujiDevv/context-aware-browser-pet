<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .ninja-body { transform-origin: 7.5px 15px; animation: ninja-dash 1.5s infinite ease-in-out; }
      .ninja-shadow { transform-origin: 7.5px 15.5px; animation: ninja-shadow 1.5s infinite ease-in-out; }
      .ninja-arm-r { transform-origin: 14px 10px; animation: ninja-slash 1.5s infinite ease-in-out; }
      .ninja-eyes { transform-origin: 7.5px 9px; animation: ninja-blink 4s infinite; }
      .shuriken { animation: shuriken-spin 0.5s infinite linear; transform-origin: 18px 2px; }
      @keyframes ninja-dash { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(2px); } }
      @keyframes ninja-shadow { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.3; } }
      @keyframes ninja-slash { 0%, 70%, 100% { transform: rotate(0deg); } 40% { transform: rotate(-90deg); } }
      @keyframes ninja-blink { 0%, 46%, 54%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
      @keyframes shuriken-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </defs>
  <rect class="ninja-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Shuriken -->
  <g class="shuriken" fill="#888">
    <rect x="17" y="1" width="2" height="2"/>
    <rect x="16" y="2" width="1" height="1"/>
    <rect x="19" y="2" width="1" height="1"/>
    <rect x="18" y="0" width="1" height="1"/>
    <rect x="18" y="3" width="1" height="1"/>
  </g>
  <g class="ninja-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/>
      <rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/>
      <rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/>
      <g class="ninja-arm-r"><rect x="13" y="9" width="2" height="2"/></g>
    </g>
    <!-- Ninja headband -->
    <rect x="2" y="6" width="11" height="2" fill="#333"/>
    <rect x="13" y="6" width="3" height="1" fill="#333"/>
    <rect x="14" y="7" width="2" height="1" fill="#333"/>
    <!-- Narrow eyes through headband -->
    <g class="ninja-eyes" fill="#FFF">
      <rect x="4" y="7" width="2" height="1"/>
      <rect x="10" y="7" width="2" height="1"/>
    </g>
  </g>
</svg>
