<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .evil-body { transform-origin: 7.5px 15px; animation: evil-hover 2s infinite ease-in-out; }
      .evil-shadow { animation: evil-s 2s infinite ease-in-out; }
      .evil-glow { animation: evil-pulse 1.5s infinite ease-in-out; }
      .evil-flame1 { animation: evil-flicker 0.3s infinite alternate; }
      .evil-flame2 { animation: evil-flicker 0.4s infinite alternate-reverse; }
      @keyframes evil-hover { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-2px) rotate(-1deg); } }
      @keyframes evil-s { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(0.7); opacity: 0.25; } }
      @keyframes evil-pulse { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.3; } }
      @keyframes evil-flicker { 0% { transform: translateY(0); opacity: 0.8; } 100% { transform: translateY(-1px); opacity: 1; } }
    </style>
  </defs>
  <rect class="evil-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Purple evil aura -->
  <rect class="evil-glow" x="0" y="4" width="15" height="13" rx="2" fill="#8B00FF" opacity="0.15"/>
  <!-- Devil horns -->
  <g fill="#CC0000">
    <rect x="3" y="3" width="1" height="3"/><rect x="2" y="3" width="1" height="2"/>
    <rect x="11" y="3" width="1" height="3"/><rect x="12" y="3" width="1" height="2"/>
  </g>
  <!-- Tiny flames at horn tips -->
  <rect class="evil-flame1" x="2" y="1" width="1" height="2" fill="#FF4400"/>
  <rect class="evil-flame2" x="12" y="1" width="1" height="2" fill="#FF4400"/>
  <g class="evil-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Angry/evil angled eyebrows -->
    <g fill="#000">
      <rect x="4" y="7" width="1" height="1"/><rect x="5" y="8" width="1" height="1"/>
      <rect x="11" y="7" width="1" height="1"/><rect x="10" y="8" width="1" height="1"/>
    </g>
    <!-- Glowing red eyes -->
    <g fill="#FF0000">
      <rect x="5" y="9" width="1" height="1"/><rect x="10" y="9" width="1" height="1"/>
    </g>
    <!-- Evil grin -->
    <g fill="#000" opacity="0.8">
      <rect x="5" y="11" width="5" height="1"/>
      <rect x="5" y="11" width="1" height="1"/><rect x="7" y="11" width="1" height="1"/><rect x="9" y="11" width="1" height="1"/>
      <rect x="6" y="12" width="3" height="1"/>
    </g>
  </g>
</svg>
