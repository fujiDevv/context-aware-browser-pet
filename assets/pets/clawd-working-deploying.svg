<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .dep-body { transform-origin: 7.5px 15px; animation: dep-bounce 1s infinite ease-in-out; }
      .dep-shadow { animation: dep-s 1s infinite; }
      .dep-rocket { animation: dep-launch 2s infinite ease-in-out; }
      .dep-flame { animation: dep-flicker 0.2s infinite alternate; }
      @keyframes dep-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
      @keyframes dep-s { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.3; } }
      @keyframes dep-launch { 0% { transform: translateY(0); opacity: 1; } 80% { transform: translateY(-15px); opacity: 1; } 100% { transform: translateY(-18px); opacity: 0; } }
      @keyframes dep-flicker { 0% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
  </defs>
  <rect class="dep-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Laptop -->
  <g fill="#777">
    <rect x="-4" y="13" width="8" height="1"/>
    <rect x="-3" y="8" width="6" height="5" fill="#555"/>
    <rect x="-2" y="9" width="4" height="3" fill="#3AF"/>
  </g>
  <g class="dep-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Excited wide eyes -->
    <g fill="#000">
      <rect x="5" y="8" width="2" height="2"/><rect x="9" y="8" width="2" height="2"/>
    </g>
    <g fill="#fff">
      <rect x="5" y="8" width="1" height="1"/><rect x="9" y="8" width="1" height="1"/>
    </g>
  </g>
  <!-- Rocket -->
  <g class="dep-rocket">
    <g fill="#E44">
      <rect x="-1" y="2" width="2" height="4"/>
      <rect x="0" y="0" width="0" height="0"/>
    </g>
    <rect x="-1" y="1" width="2" height="1" fill="#FFF"/>
    <rect x="0" y="0" width="0" height="0"/>
    <!-- Nose cone -->
    <rect x="-0.5" y="0" width="1" height="1" fill="#E44"/>
    <!-- Flame -->
    <g class="dep-flame">
      <rect x="-1" y="6" width="2" height="1" fill="#F80"/>
      <rect x="-0.5" y="7" width="1" height="1" fill="#FF0"/>
    </g>
  </g>
</svg>
