<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .king-body { transform-origin: 7.5px 15px; animation: king-stand 3s infinite ease-in-out; }
      .king-shadow { animation: king-s 3s infinite; }
      .king-eyes { transform-origin: 7.5px 9px; animation: king-blink 4s infinite; }
      .crown-shine { animation: crown-glint 2s infinite ease-in-out; }
      @keyframes king-stand { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-1px); } }
      @keyframes king-s { 0%, 100% { opacity: 0.5; } }
      @keyframes king-blink { 0%, 46%, 54%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
      @keyframes crown-glint { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
  </defs>
  <rect class="king-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <g class="king-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Crown -->
    <rect x="3" y="4" width="9" height="2" fill="#FFD700"/>
    <rect x="3" y="2" width="2" height="2" fill="#FFD700"/>
    <rect x="6" y="1" width="3" height="3" fill="#FFD700"/>
    <rect x="10" y="2" width="2" height="2" fill="#FFD700"/>
    <!-- Jewels -->
    <rect x="7" y="2" width="1" height="1" fill="#FF4444"/>
    <rect x="4" y="3" width="1" height="1" fill="#4488FF"/>
    <rect x="10" y="3" width="1" height="1" fill="#44CC44"/>
    <rect class="crown-shine" x="7" y="1" width="1" height="1" fill="#FFF"/>
    <g class="king-eyes" fill="#000">
      <rect x="4" y="8" width="1" height="2"/><rect x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
