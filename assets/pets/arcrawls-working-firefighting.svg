<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .ff-body { transform-origin: 7.5px 15px; animation: ff-brace 2.4s infinite ease-in-out; }
      .ff-arm { transform-origin: 13px 10px; animation: ff-aim 2.4s infinite ease-in-out; }
      .ff-jet { animation: ff-spray 0.8s infinite linear; }
      .ff-j1 { animation-delay: 0s; } .ff-j2 { animation-delay: 0.2s; } .ff-j3 { animation-delay: 0.4s; } .ff-j4 { animation-delay: 0.6s; }
      .ff-flame { transform-origin: 19px 14px; animation: ff-flicker 0.4s infinite ease-in-out; }
      @keyframes ff-brace { 0%, 100% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } }
      @keyframes ff-aim { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
      @keyframes ff-spray { 0% { transform: translate(0, 0); opacity: 0; } 15% { opacity: 1; } 50% { transform: translate(2px, -1px); } 100% { transform: translate(4px, 2px); opacity: 0; } }
      @keyframes ff-flicker { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.55) translateY(0.7px); } }
    </style>
  </defs>

  <rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <rect x="18" y="15" width="4" height="1" fill="#000" opacity="0.3"/>

  <!-- the fire -->
  <g class="ff-flame">
    <rect x="18" y="10" width="2" height="4" fill="#FF7043"/>
    <rect x="18" y="9" width="1" height="1" fill="#FF7043"/>
    <rect x="18.5" y="11" width="1" height="2" fill="#FFCA28"/>
  </g>

  <!-- water jet arcing into the fire -->
  <g fill="#4FC3F7">
    <rect class="ff-jet ff-j1" x="16" y="9" width="1" height="1"/>
    <rect class="ff-jet ff-j2" x="16" y="8" width="1" height="1" fill="#81D4FA"/>
    <rect class="ff-jet ff-j3" x="16" y="9" width="1" height="1" fill="#E1F5FE"/>
    <rect class="ff-jet ff-j4" x="16" y="10" width="1" height="1" fill="#81D4FA"/>
  </g>

  <g class="ff-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/>
    </g>
    <!-- clean, determined face -->
    <g fill="#000"><rect x="4" y="8" width="1" height="2"/><rect x="10" y="8" width="1" height="2"/></g>

    <!-- clean firefighter helmet -->
    <rect x="5" y="3" width="5" height="1" fill="#D32F2F"/>
    <rect x="4" y="4" width="7" height="2" fill="#D32F2F"/>
    <rect x="3" y="6" width="9" height="1" fill="#B71C1C"/>
    <rect x="7" y="4" width="1" height="1" fill="#FFD54F"/>

    <!-- right arm aiming the hose nozzle -->
    <g class="ff-arm">
      <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
      <rect x="15" y="9" width="1" height="1" fill="#607D8B"/>
      <rect x="16" y="9" width="1" height="1" fill="#37474F"/>
    </g>
  </g>
</svg>
