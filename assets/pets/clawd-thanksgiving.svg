<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .tgv-body { transform-origin: 7.5px 15px; animation: tgv-sway 3.5s infinite ease-in-out; }
      .tgv-pat { transform-origin: 13px 10px; animation: tgv-pat 1.3s infinite ease-in-out; }
      .tgv-pie { transform-origin: 0px 8px; animation: tgv-lift 3.5s infinite ease-in-out; }
      .tgv-s1 { animation: tgv-steam 2.2s infinite ease-in-out; }
      .tgv-s2 { animation: tgv-steam 2.2s infinite ease-in-out 0.8s; }
      @keyframes tgv-sway { 0%, 100% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } }
      @keyframes tgv-pat { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-1.5px); } }
      @keyframes tgv-lift { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-0.5px); } }
      @keyframes tgv-steam { 0% { transform: translateY(1px); opacity: 0; } 40% { opacity: 0.6; } 100% { transform: translateY(-4px); opacity: 0; } }
    </style>
  </defs>

  <rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>

  <g class="tgv-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/>
    </g>
    <!-- content, closed happy eyes -->
    <g fill="#000">
      <rect x="3" y="9" width="1" height="1"/><rect x="4" y="8" width="1" height="1"/><rect x="5" y="9" width="1" height="1"/>
      <rect x="9" y="9" width="1" height="1"/><rect x="10" y="8" width="1" height="1"/><rect x="11" y="9" width="1" height="1"/>
    </g>

    <!-- full-belly pat -->
    <g class="tgv-pat"><rect x="13" y="9" width="2" height="2" fill="#DE886D"/></g>

    <!-- pie held up -->
    <g class="tgv-pie">
      <rect x="-2" y="8" width="4" height="1" fill="#A1582E"/>
      <rect x="-2" y="7" width="4" height="1" fill="#C68642"/>
      <rect x="-2" y="6" width="1" height="1" fill="#D7A86E"/><rect x="0" y="6" width="1" height="1" fill="#D7A86E"/><rect x="1" y="6" width="1" height="1" fill="#D7A86E"/>
      <rect class="tgv-s1" x="-1" y="4" width="1" height="1" fill="#ECEFF1"/>
      <rect class="tgv-s2" x="1" y="4" width="1" height="1" fill="#ECEFF1"/>
    </g>
  </g>
</svg>
