<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .bored-body { transform-origin: 7.5px 15px; animation: bored-droop 4s infinite ease-in-out; }
      .bored-shadow { animation: bored-s 4s infinite; }
      .bored-eyes { animation: bored-look 6s infinite ease-in-out; }
      @keyframes bored-droop { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(1px); } }
      @keyframes bored-s { 0%, 100% { opacity: 0.5; } }
      @keyframes bored-look { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(2px); } 75% { transform: translateX(-2px); } }
    </style>
  </defs>
  <rect class="bored-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <g class="bored-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="10" width="2" height="2"/><rect x="13" y="10" width="2" height="2"/>
    </g>
    <!-- Half-lidded bored eyes -->
    <g fill="#000">
      <rect x="4" y="8" width="2" height="1"/><rect x="4" y="9" width="1" height="1"/>
      <rect x="10" y="8" width="2" height="1"/><rect x="10" y="9" width="1" height="1"/>
    </g>
    <g class="bored-eyes" fill="#000">
      <rect x="5" y="9" width="1" height="1"/><rect x="11" y="9" width="1" height="1"/>
    </g>
  </g>
</svg>
