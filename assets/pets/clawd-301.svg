<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .e301-body { transform-origin: 7.5px 15px; animation: e301-lean 2s infinite ease-in-out; }
      .e301-shadow { opacity: 0.5; }
      .e301-text { animation: e301-flash 2s infinite; }
      .e301-arrow { animation: e301-slide 1.5s infinite ease-in-out; }
      @keyframes e301-lean { 0%, 100% { transform: translateX(0) rotate(0deg); } 50% { transform: translateX(2px) rotate(3deg); } }
      @keyframes e301-flash { 0%, 70% { opacity: 1; } 35% { opacity: 0.3; } }
      @keyframes e301-slide { 0% { transform: translateX(-4px); opacity: 0; } 50% { transform: translateX(0); opacity: 1; } 100% { transform: translateX(4px); opacity: 0; } }
    </style>
  </defs>
  <rect class="e301-shadow" x="3" y="15" width="9" height="1" fill="#000"/>
  <!-- 301 text above -->
  <g class="e301-text" fill="#FF8800">
    <!-- 3 -->
    <rect x="2" y="-3" width="2" height="1"/><rect x="3" y="-2" width="1" height="1"/>
    <rect x="2" y="-1" width="2" height="1"/><rect x="3" y="0" width="1" height="1"/>
    <rect x="2" y="1" width="2" height="1"/>
    <!-- 0 -->
    <rect x="5" y="-3" width="3" height="1"/><rect x="5" y="1" width="3" height="1"/>
    <rect x="5" y="-3" width="1" height="5"/><rect x="7" y="-3" width="1" height="5"/>
    <!-- 1 -->
    <rect x="10" y="-3" width="1" height="5"/><rect x="9" y="-2" width="1" height="1"/>
    <rect x="9" y="1" width="3" height="1"/>
  </g>
  <!-- Sliding arrow -->
  <g class="e301-arrow" fill="#FF8800">
    <rect x="16" y="9" width="6" height="1"/>
    <rect x="20" y="7" width="1" height="1"/><rect x="21" y="8" width="1" height="1"/>
    <rect x="22" y="9" width="1" height="1"/>
    <rect x="21" y="10" width="1" height="1"/><rect x="20" y="11" width="1" height="1"/>
  </g>
  <g class="e301-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Eyes looking right -->
    <g fill="#000">
      <rect x="6" y="8" width="1" height="2"/><rect x="11" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
