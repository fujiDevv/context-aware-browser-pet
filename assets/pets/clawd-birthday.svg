<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .bday-body { transform-origin: 7.5px 15px; animation: bday-bounce 0.8s infinite ease-in-out; }
      .bday-shadow { transform-origin: 7.5px 15.5px; animation: bday-shadow 0.8s infinite ease-in-out; }
      .bday-eyes { transform-origin: 7.5px 9px; animation: bday-blink 3s infinite; }
      .confetti-a { animation: bday-fall 1.5s infinite linear; }
      .confetti-b { animation: bday-fall 1.5s infinite linear 0.3s; }
      .confetti-c { animation: bday-fall 1.5s infinite linear 0.6s; }
      .confetti-d { animation: bday-fall 1.5s infinite linear 0.9s; }
      .flame-bday { animation: bday-flame 0.3s infinite alternate; }
      @keyframes bday-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
      @keyframes bday-shadow { 0%, 100% { transform: scaleX(1); opacity: 0.5; } 50% { transform: scaleX(0.8); opacity: 0.3; } }
      @keyframes bday-blink { 0%, 46%, 54%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
      @keyframes bday-fall { 0% { transform: translate(0, -8px) rotate(0deg); opacity: 1; } 100% { transform: translate(2px, 16px) rotate(360deg); opacity: 0; } }
      @keyframes bday-flame { 0% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
  </defs>
  <rect class="bday-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <rect class="confetti-a" x="-1" y="-3" width="1" height="1" fill="#FF4444"/>
  <rect class="confetti-b" x="5" y="-3" width="1" height="1" fill="#FFD700"/>
  <rect class="confetti-c" x="10" y="-3" width="1" height="1" fill="#44FF44"/>
  <rect class="confetti-d" x="15" y="-3" width="1" height="1" fill="#FF44FF"/>
  <g class="bday-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Party hat -->
    <rect x="4" y="4" width="7" height="2" fill="#FF44FF"/>
    <rect x="5" y="2" width="5" height="2" fill="#FF44FF"/>
    <rect x="6" y="1" width="3" height="1" fill="#FF44FF"/>
    <rect x="7" y="0" width="1" height="1" fill="#FFD700"/>
    <rect x="4" y="5" width="7" height="1" fill="#FFD700"/>
    <g class="bday-eyes" fill="#000">
      <rect x="4" y="8" width="1" height="2"/><rect x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
