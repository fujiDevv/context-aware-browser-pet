<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs><style>
    .craft-body { transform-origin: 7.5px 15px; animation: craft-work 1s ease-in-out infinite; }
    .craft-shadow { animation: craft-s 1s ease-in-out infinite; }
    .craft-scrap1 { animation: craft-float1 2.5s ease-in-out infinite; }
    .craft-scrap2 { animation: craft-float2 3s ease-in-out 0.5s infinite; }
    .craft-scrap3 { animation: craft-float3 2s ease-in-out 1s infinite; }
    @keyframes craft-work { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-1deg); } }
    @keyframes craft-s { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.45; } }
    @keyframes craft-float1 { 0%, 100% { transform: translate(0, 0); opacity: 0.8; } 50% { transform: translate(1px, -2px); opacity: 0.4; } }
    @keyframes craft-float2 { 0%, 100% { transform: translate(0, 0); opacity: 0.7; } 50% { transform: translate(-1px, -3px); opacity: 0.3; } }
    @keyframes craft-float3 { 0%, 100% { transform: translate(0, 0); opacity: 0.9; } 50% { transform: translate(2px, -1px); opacity: 0.5; } }
  </style></defs>
  <rect class="craft-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Scissors -->
  <rect x="16" y="10" width="1" height="3" fill="#888" transform="rotate(20 16 11)"/>
  <rect x="18" y="10" width="1" height="3" fill="#888" transform="rotate(-20 18 11)"/>
  <rect x="16" y="12" width="3" height="1" fill="#C0392B"/>
  <!-- Floating paper scraps -->
  <rect class="craft-scrap1" x="-5" y="3" width="2" height="2" fill="#E74C3C"/>
  <rect class="craft-scrap2" x="18" y="1" width="2" height="1" fill="#3498DB"/>
  <rect class="craft-scrap3" x="-3" y="-2" width="1" height="2" fill="#2ECC71"/>
  <g class="craft-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <g fill="#000">
      <rect x="5" y="9" width="1" height="2"/><rect x="10" y="9" width="1" height="2"/>
    </g>
  </g>
</svg>