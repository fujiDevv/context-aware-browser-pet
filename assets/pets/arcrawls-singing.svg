<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .sing-body { transform-origin: 7.5px 15px; animation: sing-sway 1s infinite ease-in-out; }
      .sing-shadow { animation: sing-s 1s infinite; }
      .sing-eyes { transform-origin: 7.5px 9px; animation: sing-blink 4s infinite; }
      .note-a { animation: note-up 1.5s infinite ease-out; }
      .note-b { animation: note-up 1.5s infinite ease-out 0.5s; }
      .note-c { animation: note-up 1.5s infinite ease-out 1s; }
      @keyframes sing-sway { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-3deg); } 75% { transform: rotate(3deg); } }
      @keyframes sing-s { 0%, 100% { opacity: 0.5; } }
      @keyframes sing-blink { 0%, 46%, 54%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
      @keyframes note-up { 0% { opacity: 0.8; transform: translate(0,0) scale(0.6); } 100% { opacity: 0; transform: translate(2px, -7px) scale(1); } }
    </style>
  </defs>
  <rect class="sing-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <g fill="#FFD700">
    <g class="note-a"><rect x="14" y="3" width="1" height="3"/><rect x="15" y="2" width="1" height="2"/></g>
    <g class="note-b"><rect x="17" y="1" width="1" height="3"/><rect x="18" y="0" width="1" height="2"/></g>
    <g class="note-c"><rect x="15" y="5" width="1" height="3"/><rect x="16" y="4" width="1" height="2"/></g>
  </g>
  <g class="sing-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <g class="sing-eyes" fill="#000">
      <rect x="4" y="8" width="1" height="2"/><rect x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
