<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs><style>
    .hero-body { transform-origin: 7.5px 10px; animation: hero-fly 2s ease-in-out infinite; }
    .hero-shadow { animation: hero-s 2s ease-in-out infinite; }
    .hero-cape { transform-origin: 7.5px 6px; animation: hero-cape-wave 1s ease-in-out infinite; }
    .hero-wind1 { animation: hero-wind 1.5s ease-in-out infinite; }
    .hero-wind2 { animation: hero-wind 1.5s ease-in-out 0.5s infinite; }
    @keyframes hero-fly { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes hero-s { 0%, 100% { opacity: 0.5; width: 9px; } 50% { opacity: 0.3; width: 7px; } }
    @keyframes hero-cape-wave { 0%, 100% { transform: skewX(0deg); } 50% { transform: skewX(5deg); } }
    @keyframes hero-wind { 0%, 100% { opacity: 0.3; transform: translateY(0); } 50% { opacity: 0.6; transform: translateY(1px); } }
  </style></defs>
  <rect class="hero-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Wind lines -->
  <rect class="hero-wind1" x="-5" y="8" width="4" height="1" fill="#AAA" opacity="0.3"/>
  <rect class="hero-wind2" x="-7" y="11" width="5" height="1" fill="#AAA" opacity="0.3"/>
  <g class="hero-body">
    <!-- Cape behind -->
    <g class="hero-cape">
      <rect x="3" y="7" width="9" height="3" fill="#E74C3C"/>
      <rect x="2" y="10" width="11" height="3" fill="#C0392B"/>
      <rect x="1" y="13" width="13" height="2" fill="#E74C3C"/>
    </g>
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/>
    </g>
    <!-- Raised fist (right arm up) -->
    <rect x="13" y="5" width="2" height="2" fill="#DE886D"/>
    <rect x="13" y="4" width="2" height="1" fill="#DE886D"/>
    <g fill="#000">
      <rect x="5" y="9" width="1" height="2"/><rect x="10" y="9" width="1" height="2"/>
    </g>
  </g>
</svg>