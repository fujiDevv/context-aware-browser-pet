<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs><style>
    .pod-body { transform-origin: 7.5px 15px; animation: pod-sway 3s ease-in-out infinite; }
    .pod-shadow { animation: pod-s 3s ease-in-out infinite; }
    .pod-mouth { animation: pod-talk 0.4s steps(2) infinite; }
    @keyframes pod-sway { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(1deg); } }
    @keyframes pod-s { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.45; } }
    @keyframes pod-talk { 0%, 100% { height: 1px; } 50% { height: 0px; } }
  </style></defs>
  <rect class="pod-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Microphone on stand -->
  <rect x="-4" y="6" width="1" height="10" fill="#555"/>
  <rect x="-6" y="14" width="5" height="1" fill="#555"/>
  <rect x="-6" y="6" width="4" height="3" fill="#444"/>
  <rect x="-6" y="6" width="4" height="1" fill="#666"/>
  <!-- Mic grille dots -->
  <rect x="-5" y="7" width="1" height="1" fill="#777"/>
  <rect x="-4" y="8" width="1" height="1" fill="#777"/>
  <g class="pod-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Headphones -->
    <rect x="2" y="5" width="11" height="1" fill="#333"/>
    <rect x="1" y="6" width="2" height="2" fill="#444"/>
    <rect x="12" y="6" width="2" height="2" fill="#444"/>
    <g fill="#000">
      <rect x="5" y="9" width="1" height="2"/><rect x="10" y="9" width="1" height="2"/>
    </g>
    <!-- Mouth (animated talking) -->
    <rect class="pod-mouth" x="7" y="11" width="2" height="1" fill="#C0392B"/>
  </g>
</svg>