<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .yawn-body { transform-origin: 7.5px 15px; animation: yawn-sway 3s infinite ease-in-out; }
      .yawn-shadow { animation: yawn-s 3s infinite ease-in-out; }
      .zzz1 { animation: zzz-float 2.5s infinite ease-out; }
      .zzz2 { animation: zzz-float 2.5s infinite ease-out 0.8s; }
      .zzz3 { animation: zzz-float 2.5s infinite ease-out 1.6s; }
      @keyframes yawn-sway { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(2deg); } }
      @keyframes yawn-s { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.4; } }
      @keyframes zzz-float { 0% { opacity: 0.8; transform: translate(0, 0) scale(0.6); } 100% { opacity: 0; transform: translate(3px, -6px) scale(1); } }
    </style>
  </defs>
  <rect class="yawn-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <g fill="#888" font-family="monospace" opacity="0.7">
    <text class="zzz1" x="14" y="4" font-size="3">Z</text>
    <text class="zzz2" x="16" y="1" font-size="2.5">Z</text>
    <text class="zzz3" x="18" y="-2" font-size="2">Z</text>
  </g>
  <g class="yawn-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <g fill="#000">
      <rect x="5" y="10" width="2" height="1"/>
      <rect x="10" y="10" width="2" height="1"/>
      <rect x="7" y="11" width="2" height="1"/>
    </g>
  </g>
</svg>
