<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .astro-body { transform-origin: 7.5px 15px; animation: astro-float 3s infinite ease-in-out; }
      .astro-shadow { transform-origin: 7.5px 15.5px; animation: astro-shadow 3s infinite ease-in-out; }
      .astro-eyes { transform-origin: 7.5px 9px; animation: astro-blink 4s infinite; }
      .star-a1 { animation: star-t 1.5s infinite ease-in-out; }
      .star-a2 { animation: star-t 1.5s infinite ease-in-out 0.5s; }
      .star-a3 { animation: star-t 1.5s infinite ease-in-out 1s; }
      @keyframes astro-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
      @keyframes astro-shadow { 0%, 100% { transform: scaleX(1); opacity: 0.5; } 50% { transform: scaleX(0.5); opacity: 0.15; } }
      @keyframes astro-blink { 0%, 46%, 54%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
      @keyframes star-t { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
  </defs>
  <rect class="astro-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <rect class="star-a1" x="-3" y="-5" width="1" height="1" fill="#FFF"/>
  <rect class="star-a2" x="16" y="-3" width="1" height="1" fill="#FFF"/>
  <rect class="star-a3" x="8" y="-8" width="1" height="1" fill="#FFD700"/>
  <g class="astro-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Helmet -->
    <rect x="1" y="4" width="13" height="7" fill="#FFF" opacity="0.3"/>
    <rect x="2" y="3" width="11" height="1" fill="#AAA"/>
    <rect x="2" y="11" width="11" height="1" fill="#AAA"/>
    <rect x="1" y="4" width="1" height="7" fill="#AAA"/>
    <rect x="13" y="4" width="1" height="7" fill="#AAA"/>
    <!-- Visor -->
    <rect x="3" y="6" width="9" height="4" fill="#88DDFF" opacity="0.4"/>
    <g class="astro-eyes" fill="#000">
      <rect x="4" y="8" width="1" height="2"/><rect x="10" y="8" width="1" height="2"/>
    </g>
  </g>
</svg>
