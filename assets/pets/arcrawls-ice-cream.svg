<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs><style>
    .icecream-body { transform-origin: 7.5px 15px; animation: icecream-tilt 2s ease-in-out infinite; }
    .icecream-shadow { animation: icecream-s 2s ease-in-out infinite; }
    @keyframes icecream-tilt { 0%, 100% { transform: rotate(0deg); } 30%, 70% { transform: rotate(3deg); } }
    @keyframes icecream-s { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.45; } }
  </style></defs>
  <rect class="icecream-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <g class="icecream-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Happy eyes (smaller, dot-like) -->
    <g fill="#000">
      <rect x="5" y="9" width="1" height="1"/><rect x="10" y="9" width="1" height="1"/>
    </g>
    <!-- Ice cream cone in left hand -->
    <!-- Cone -->
    <rect x="-3" y="10" width="3" height="1" fill="#D4A437"/>
    <rect x="-2" y="11" width="2" height="1" fill="#C49632"/>
    <rect x="-2" y="12" width="1" height="1" fill="#B8860B"/>
    <!-- Scoops -->
    <rect x="-4" y="8" width="2" height="2" fill="#FF69B4"/>
    <rect x="-2" y="8" width="2" height="2" fill="#87CEEB"/>
    <rect x="-3" y="7" width="2" height="1" fill="#98FB98"/>
  </g>
</svg>