<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .cry-body { transform-origin: 7.5px 15px; animation: cry-shake 0.5s infinite ease-in-out; }
      .cry-shadow { animation: cry-shadow 0.5s infinite; }
      .tear-l { animation: tear-fall-l 1s infinite ease-in; }
      .tear-r { animation: tear-fall-r 1s infinite ease-in 0.3s; }
      @keyframes cry-shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-2deg); } 75% { transform: rotate(2deg); } }
      @keyframes cry-shadow { 0%, 100% { opacity: 0.5; } }
      @keyframes tear-fall-l { 0% { opacity: 0; transform: translateY(0); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateY(6px); } }
      @keyframes tear-fall-r { 0% { opacity: 0; transform: translateY(0); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateY(6px); } }
    </style>
  </defs>
  <rect class="cry-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <g class="cry-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <!-- Sad eyes -->
    <g fill="#000">
      <rect x="4" y="7" width="1" height="1"/><rect x="5" y="8" width="1" height="1"/><rect x="6" y="7" width="1" height="1"/>
      <rect x="10" y="7" width="1" height="1"/><rect x="11" y="8" width="1" height="1"/><rect x="12" y="7" width="1" height="1"/>
    </g>
    <!-- Tears -->
    <rect class="tear-l" x="4" y="9" width="1" height="2" fill="#40C4FF"/>
    <rect class="tear-r" x="11" y="9" width="1" height="2" fill="#40C4FF"/>
  </g>
</svg>
