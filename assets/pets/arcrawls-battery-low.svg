<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .bat-body { transform-origin: 7.5px 15px; animation: bat-droop 3s infinite ease-in-out; }
      .bat-shadow { animation: bat-s 3s infinite; }
      .bat-icon { animation: bat-flash 1s infinite; }
      @keyframes bat-droop { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.95) translateY(1px); } }
      @keyframes bat-s { 0%, 100% { opacity: 0.5; } }
      @keyframes bat-flash { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0.3; } }
    </style>
  </defs>
  <rect class="bat-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- Battery icon -->
  <g class="bat-icon">
    <rect x="4" y="-1" width="7" height="4" fill="none" stroke="#FF4444" stroke-width="0.5"/>
    <rect x="11" y="0" width="1" height="2" fill="#FF4444"/>
    <rect x="4.5" y="-0.5" width="2" height="3" fill="#FF4444"/>
  </g>
  <g class="bat-body">
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="10" width="2" height="2"/><rect x="13" y="10" width="2" height="2"/>
    </g>
    <!-- Droopy half-closed eyes -->
    <g fill="#000">
      <rect x="4" y="9" width="2" height="1"/><rect x="10" y="9" width="2" height="1"/>
    </g>
  </g>
</svg>
