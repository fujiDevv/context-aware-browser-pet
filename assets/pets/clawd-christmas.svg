<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .xmas-body { transform-origin: 7.5px 15px; animation: xmas-sway 2.5s infinite ease-in-out; }
      .snow1 { animation: snow-fall 3s infinite linear; }
      .snow2 { animation: snow-fall 3s infinite linear 1s; }
      .snow3 { animation: snow-fall 3s infinite linear 2s; }
      .snow4 { animation: snow-fall 3s infinite linear 0.5s; }
      .snow5 { animation: snow-fall 3s infinite linear 1.5s; }
      @keyframes xmas-sway { 0%, 100% { transform: rotate(-0.5deg); } 50% { transform: rotate(0.5deg); } }
      @keyframes snow-fall { 0% { transform: translateY(-15px); opacity: 1; } 100% { transform: translateY(20px); opacity: 0; } }
    </style>
  </defs>
  <rect x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
  <!-- snowflakes -->
  <rect class="snow1" x="-5" y="-5" width="1" height="1" fill="#FFF"/>
  <rect class="snow2" x="2" y="-8" width="1" height="1" fill="#FFF"/>
  <rect class="snow3" x="16" y="-3" width="1" height="1" fill="#FFF"/>
  <rect class="snow4" x="10" y="-10" width="1" height="1" fill="#FFF"/>
  <rect class="snow5" x="-2" y="-12" width="1" height="1" fill="#FFF"/>
  <g class="xmas-body">
    <!-- santa hat -->
    <g fill="#CC0000">
      <rect x="3" y="4" width="9" height="2"/>
      <rect x="5" y="2" width="5" height="2"/>
      <rect x="7" y="0" width="3" height="2"/>
    </g>
    <rect x="2" y="5" width="11" height="1" fill="#FFFFFF"/>
    <rect x="9" y="-1" width="2" height="2" fill="#FFFFFF" rx="1"/>
    <g fill="#DE886D">
      <rect x="3" y="13" width="1" height="2"/><rect x="5" y="13" width="1" height="2"/>
      <rect x="9" y="13" width="1" height="2"/><rect x="11" y="13" width="1" height="2"/>
      <rect x="2" y="6" width="11" height="7"/>
      <rect x="0" y="9" width="2" height="2"/><rect x="13" y="9" width="2" height="2"/>
    </g>
    <g fill="#000">
      <!-- happy eyes -->
      <rect x="5" y="9" width="1" height="2"/><rect x="10" y="9" width="1" height="2"/>
    </g>
  </g>
</svg>